<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thekodia — Initiative</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #0a0c10;
  --bg2: #0f1219;
  --bg3: #161a24;
  --border: #1e2535;
  --border2: #2a3448;
  --accent: #c8a96e;
  --accent2: #e8c97e;
  --accent-dim: #5a4428;
  --red: #e05555;
  --green: #4caf7d;
  --amber: #f0a500;
  --text: #e8e0d0;
  --text2: #8a8070;
  --text3: #3a3428;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
}

.header {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}

.header-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.round-badge {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  color: var(--text2);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-left: auto;
}

.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 14px;
  color: var(--text3);
  letter-spacing: 0.08em;
}

.combatant-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.combatant-list::-webkit-scrollbar { width: 4px; }
.combatant-list::-webkit-scrollbar-track { background: transparent; }
.combatant-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.row {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 10px;
  display: flex;
  align-items: center;
  gap: 9px;
  transition: border-color 0.2s;
  position: relative;
  overflow: hidden;
}

.row.active {
  border-color: var(--accent-dim);
  background: linear-gradient(90deg, rgba(200,169,110,0.08), transparent);
}

.row.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
}

.row.dead { opacity: 0.38; filter: grayscale(0.5); }

.init-badge {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text2);
  min-width: 26px;
  text-align: center;
  flex-shrink: 0;
}
.row.active .init-badge { color: var(--accent2); }

.thumb {
  width: 32px; height: 32px;
  border-radius: 5px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  overflow: hidden;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.thumb img { width: 100%; height: 100%; object-fit: cover; }

.info { flex: 1; min-width: 0; }

.name {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}
.row.active .name { color: var(--accent2); }

.hp-bar-track {
  height: 4px;
  background: var(--bg2);
  border-radius: 2px;
  margin-top: 5px;
  overflow: hidden;
}
.hp-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

.conditions {
  display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px;
}

.cond-tag {
  font-size: 9px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.type-chip {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">⚔ Initiative</div>
  <div class="round-badge" id="roundBadge">—</div>
</div>

<div class="empty-state" id="emptyState">No Combat Active</div>
<div class="combatant-list" id="combatantList" style="display:none"></div>

<script>
const LIVE_KEY = 'thekodia_live_combat';

const COND_COLORS = {
  Blinded: '#888', Charmed: '#ff69b4', Deafened: '#8a8070',
  Exhaustion: '#9b72cf', Frightened: '#cc5500', Grappled: '#a0522d',
  Incapacitated: '#ff6b6b', Invisible: '#4ecdc4', Paralyzed: '#e05555',
  Petrified: '#888', Poisoned: '#4caf7d', Prone: '#f0a500',
  Restrained: '#c8a96e', Stunned: '#5b8de8', Unconscious: '#3a3428',
};

let lastStr = '';

function hpColor(pct) {
  return pct > 0.6 ? 'var(--green)' : pct > 0.3 ? 'var(--amber)' : 'var(--red)';
}

function render() {
  const raw = localStorage.getItem(LIVE_KEY) || 'null';
  if (raw === lastStr) return;
  lastStr = raw;

  let data;
  try { data = JSON.parse(raw); } catch {}

  const emptyEl = document.getElementById('emptyState');
  const listEl  = document.getElementById('combatantList');

  if (!data || !Array.isArray(data.combatants) || !data.combatants.length) {
    emptyEl.style.display = 'flex';
    listEl.style.display  = 'none';
    document.getElementById('roundBadge').textContent = '—';
    return;
  }

  emptyEl.style.display = 'none';
  listEl.style.display  = 'flex';
  document.getElementById('roundBadge').textContent = `Round ${data.round || 1}`;

  const { combatants, currentTurnIdx } = data;

  listEl.innerHTML = combatants.map((c, i) => {
    const isActive = i === currentTurnIdx;
    const effectiveMax = Math.max(1, (c.maxhp || 0) - (c.maxReduce || 0));
    const pct = Math.min(1, Math.max(0, (c.hp || 0) / effectiveMax));
    const thumbHtml = c.thumb
      ? `<img src="${c.thumb}">`
      : (c.type === 'player' ? '🧙' : c.type === 'npc' ? '🗣' : '💀');

    const condHtml = (c.conditions || []).map(cond => {
      const color = COND_COLORS[cond] || '#888';
      return `<span class="cond-tag" style="background:${color}22;border:1px solid ${color}66;color:${color}">${cond}</span>`;
    }).join('');

    return `<div class="row${isActive ? ' active' : ''}${c.dead ? ' dead' : ''}">
      <div class="init-badge">${c.init ?? 0}</div>
      <div class="thumb">${thumbHtml}</div>
      <div class="info">
        <div class="name">${c.name}</div>
        <div class="hp-bar-track"><div class="hp-bar-fill" style="width:${Math.round(pct * 100)}%;background:${hpColor(pct)}"></div></div>
        ${condHtml ? `<div class="conditions">${condHtml}</div>` : ''}
      </div>
      <div class="type-chip">${c.type || ''}</div>
    </div>`;
  }).join('');
}

setInterval(render, 1000);
render();
</script>
</body>
</html>
