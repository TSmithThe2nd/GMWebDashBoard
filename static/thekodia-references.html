<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thekodia DM — References</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">

:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #1a1e28;
  --panel: #181c26;
  --border: #2a3045;
  --border2: #3a4560;
  --accent: #c8a96e;
  --accent2: #e8c97e;
  --accent-dim: #7a6238;
  --red: #e05555;
  --red-dim: #7a2828;
  --green: #4caf7d;
  --green-dim: #1e5c38;
  --blue: #5b8de8;
  --blue-dim: #2a4a8a;
  --purple: #9b72cf;
  --purple-dim: #4a2e7a;
  --teal: #4ecdc4;
  --amber: #f0a500;
  --orange: #e07840;
  --text: #e8e0d0;
  --text2: #a09880;
  --text3: #605848;
  --radius: 6px;
  --radius2: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 15px; min-height: 100vh; }

.app-header {
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
}
.app-title { font-family: 'Cinzel', serif; font-size: 16px; color: var(--accent); letter-spacing: 0.1em; white-space: nowrap; }
.nav-tabs { display: flex; gap: 4px; flex: 1; }
.nav-tab {
  padding: 5px 14px; border-radius: var(--radius); border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 600; letter-spacing: 0.05em; cursor: pointer;
  transition: all 0.15s; text-transform: uppercase;
}
.nav-tab:hover { border-color: var(--border2); color: var(--text); }
.nav-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }

/* Search bar */
.search-bar {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; background: var(--panel);
  position: sticky; top: 54px; z-index: 90;
}
.search-input {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 14px;
  padding: 6px 12px; flex: 1;
}
.search-input:focus { outline: none; border-color: var(--accent-dim); }

.section-tabs { display: flex; gap: 4px; }
.section-tab {
  padding: 5px 16px; border-radius: var(--radius); border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.05em;
}
.section-tab:hover { border-color: var(--border2); color: var(--text); }
.section-tab.active { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }

/* Main layout */
.main-content { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

/* Section */
.ref-section { display: none; }
.ref-section.visible { display: block; }

/* Conditions grid */
.conditions-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px;
}

.condition-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius2);
  overflow: hidden; cursor: pointer; transition: border-color 0.15s;
}
.condition-card:hover { border-color: var(--border2); }
.condition-card.expanded { border-color: var(--accent-dim); }

.condition-header {
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
}
.condition-icon {
  width: 32px; height: 32px; border-radius: var(--radius); display: flex;
  align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.condition-name { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600; flex: 1; }
.condition-summary { font-size: 12px; color: var(--text3); }
.expand-arrow { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
.condition-card.expanded .expand-arrow { transform: rotate(180deg); }

.condition-body {
  display: none; padding: 0 14px 12px; border-top: 1px solid var(--border);
}
.condition-card.expanded .condition-body { display: block; padding-top: 10px; }

.condition-effect {
  font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 6px;
}
.condition-effect:last-child { margin-bottom: 0; }
.condition-effect::before { content: '▸ '; color: var(--accent-dim); }

/* Languages */
.lang-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px;
}

.lang-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius2);
  padding: 12px 14px; cursor: pointer; transition: border-color 0.15s;
}
.lang-card:hover { border-color: var(--border2); }
.lang-card.expanded { border-color: var(--blue-dim); }

.lang-header { display: flex; align-items: center; gap: 10px; margin-bottom: 0; }
.lang-name { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600; flex: 1; }
.lang-type-badge {
  font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.lang-type-badge.standard { background: rgba(91,141,232,0.15); border: 1px solid var(--blue-dim); color: var(--blue); }
.lang-type-badge.exotic { background: rgba(155,114,207,0.15); border: 1px solid var(--purple-dim); color: var(--purple); }
.lang-type-badge.secret { background: rgba(224,85,85,0.15); border: 1px solid var(--red-dim); color: var(--red); }
.lang-type-badge.thekodia { background: rgba(200,169,110,0.15); border: 1px solid var(--accent-dim); color: var(--accent); }

.lang-body { display: none; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
.lang-card.expanded .lang-body { display: block; }

.lang-detail { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 4px; }
.lang-detail strong { color: var(--text3); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 1px; }

/* Tools */
.tools-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px;
}

.tool-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius2);
  overflow: hidden; cursor: pointer; transition: border-color 0.15s;
}
.tool-card:hover { border-color: var(--border2); }
.tool-card.expanded { border-color: var(--green-dim); }

.tool-header {
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
}
.tool-icon {
  width: 32px; height: 32px; border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.tool-name { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600; flex: 1; }
.tool-cat-badge {
  font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.tool-cat-badge.artisan { background: rgba(240,165,0,0.15); border: 1px solid #7a5000; color: var(--amber); }
.tool-cat-badge.gaming { background: rgba(76,175,125,0.15); border: 1px solid var(--green-dim); color: var(--green); }
.tool-cat-badge.musical { background: rgba(155,114,207,0.15); border: 1px solid var(--purple-dim); color: var(--purple); }
.tool-cat-badge.other { background: rgba(91,141,232,0.15); border: 1px solid var(--blue-dim); color: var(--blue); }

.tool-body {
  display: none; padding: 0 14px 12px; border-top: 1px solid var(--border);
}
.tool-card.expanded .tool-body { display: block; padding-top: 10px; }

.tool-ability { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.tool-ability span { color: var(--accent); font-weight: 600; }
.tool-desc { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 8px; }
.tool-uses-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; font-weight: 600; }
.tool-use { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 3px; }
.tool-use::before { content: '▸ '; color: var(--green-dim); }

/* Custom entry button */
.btn {
  padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border2);
  background: transparent; color: var(--text); font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 600; letter-spacing: 0.05em; cursor: pointer;
  transition: all 0.15s; text-transform: uppercase;
}
.btn:hover { background: var(--bg3); border-color: var(--accent-dim); }
.btn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }
.btn.primary:hover { background: #8a7040; }
.btn.small { padding: 3px 8px; font-size: 12px; }

/* Custom notes card */
.custom-note {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 12px; display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px;
}
.custom-note-text { flex: 1; font-size: 13px; color: var(--text2); line-height: 1.5; }
.custom-note-del { font-size: 13px; color: var(--text3); cursor: pointer; padding: 0 2px; }
.custom-note-del:hover { color: var(--red); }

.add-custom-row { display: flex; gap: 6px; margin-top: 8px; }
.add-custom-input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 13px; padding: 5px 8px;
}
.add-custom-input:focus { outline: none; border-color: var(--accent-dim); }

.section-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.section-title { font-family: 'Cinzel', serif; font-size: 16px; color: var(--accent); letter-spacing: 0.06em; }
.section-count { font-size: 12px; color: var(--text3); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>

        <button class="btn small primary" onclick="addCustomNote('tool')">Add</button>
      </div>
    </div>
  </div>

</div>

// ─── STATE ──────────────────────────────────────────────────────────────────
let customNotes = { cond: [], lang: [], tool: [] };

function loadCustomNotes() {
  try { customNotes = JSON.parse(localStorage.getItem('thekodia_ref_notes') || '{"cond":[],"lang":[],"tool":[]}'); } catch {}
}
function saveCustomNotes() {
  try { localStorage.setItem('thekodia_ref_notes', JSON.stringify(customNotes)); } catch {}
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function renderConditions(filter = '') {
  const grid = document.getElementById('conditionsGrid');
  const q = filter.toLowerCase();
  const filtered = CONDITIONS.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.summary.toLowerCase().includes(q) ||
    c.effects.some(e => e.toLowerCase().includes(q))
  );
  document.getElementById('condCount').textContent = `${filtered.length} conditions`;
  grid.innerHTML = filtered.map(c => `
    <div class="condition-card" onclick="toggleCard(this)">
      <div class="condition-header">
        <div class="condition-icon" style="background:${c.color}22;border:1px solid ${c.color}44">${c.icon}</div>
        <div>
          <div class="condition-name" style="color:${c.color}">${c.name}</div>
          <div class="condition-summary">${c.summary}</div>
        </div>
        <div class="expand-arrow">▼</div>
      </div>
      <div class="condition-body">
        ${c.effects.map(e => `<div class="condition-effect">${e}</div>`).join('')}
      </div>
    </div>`).join('');
}

function renderLanguages(filter = '') {
  const grid = document.getElementById('languagesGrid');
  const q = filter.toLowerCase();
  const filtered = LANGUAGES.filter(l =>
    l.name.toLowerCase().includes(q) ||
    l.speakers.toLowerCase().includes(q) ||
    l.thekodia.toLowerCase().includes(q)
  );
  document.getElementById('langCount').textContent = `${filtered.length} languages`;
  grid.innerHTML = filtered.map(l => `
    <div class="lang-card" onclick="toggleCard(this)">
      <div class="lang-header">
        <div class="lang-name">${l.name}</div>
        <span class="lang-type-badge ${l.type}">${l.type}</span>
        <div class="expand-arrow" style="font-size:11px;color:var(--text3);margin-left:4px">▼</div>
      </div>
      <div class="lang-body">
        <div class="lang-detail"><strong>Typical Speakers</strong>${l.speakers}</div>
        <div class="lang-detail"><strong>Script</strong>${l.script}</div>
        ${l.thekodia ? `<div class="lang-detail"><strong>Thekodia Note</strong>${l.thekodia}</div>` : ''}
      </div>
    </div>`).join('');
}

function renderTools(filter = '') {
  const grid = document.getElementById('toolsGrid');
  const q = filter.toLowerCase();
  const filtered = TOOLS.filter(t =>
    t.name.toLowerCase().includes(q) ||
    t.cat.toLowerCase().includes(q) ||
    t.desc.toLowerCase().includes(q) ||
    t.uses.some(u => u.toLowerCase().includes(q))
  );
  document.getElementById('toolCount').textContent = `${filtered.length} tools`;
  grid.innerHTML = filtered.map(t => `
    <div class="tool-card" onclick="toggleCard(this)">
      <div class="tool-header">
        <div class="tool-icon" style="background:var(--bg3);border:1px solid var(--border)">${t.icon}</div>
        <div class="tool-name">${t.name}</div>
        <span class="tool-cat-badge ${t.cat}">${t.cat}</span>
        <div class="expand-arrow" style="font-size:11px;color:var(--text3)">▼</div>
      </div>
      <div class="tool-body">
        <div class="tool-ability">Key ability: <span>${t.ability}</span></div>
        <div class="tool-desc">${t.desc}</div>
        <div class="tool-uses-title">What you can do</div>
        ${t.uses.map(u => `<div class="tool-use">${u}</div>`).join('')}
      </div>
    </div>`).join('');
}

function renderCustomNotes() {
  ['cond','lang','tool'].forEach(key => {
    const container = document.getElementById(`custom${key.charAt(0).toUpperCase()+key.slice(1)}Notes`);
    if (!container) return;
    const noteKey = key === 'cond' ? 'cond' : key === 'lang' ? 'lang' : 'tool';
    container.innerHTML = (customNotes[noteKey]||[]).map((n,i) =>
      `<div class="custom-note">
        <div class="custom-note-text">${n}</div>
        <div class="custom-note-del" onclick="deleteCustomNote('${noteKey}',${i})">✕</div>
      </div>`
    ).join('');
  });
}

// ─── INTERACTIONS ────────────────────────────────────────────────────────────
function toggleCard(el) {
  el.classList.toggle('expanded');
}

function switchSection(name, btn) {
  document.querySelectorAll('.ref-section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.section-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('visible');
  btn.classList.add('active');
  filterAll();
}

function filterAll() {
  const q = document.getElementById('searchInput').value;
  renderConditions(q);
  renderLanguages(q);
  renderTools(q);
}

function addCustomNote(key) {
  const inputId = key + 'NoteInput';
  const val = document.getElementById(inputId).value.trim();
  if (!val) return;
  customNotes[key].push(val);
  saveCustomNotes();
  document.getElementById(inputId).value = '';
  renderCustomNotes();
}

function deleteCustomNote(key, i) {
  customNotes[key].splice(i, 1);
  saveCustomNotes();
  renderCustomNotes();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadCustomNotes();
renderConditions();
renderLanguages();
renderTools();
renderCustomNotes();
</script>
