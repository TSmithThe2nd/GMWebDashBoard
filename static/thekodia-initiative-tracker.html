<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thekodia DM — Initiative Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="thekodia.css">
  <style>
body { overflow-x: hidden; }

.round-display {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.round-label {
  font-size: 12px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.round-num {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  color: var(--accent);
  min-width: 32px;
  text-align: center;
}

/* Layout */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 12px;
  padding: 12px;
  min-height: calc(100vh - 54px);
}

/* Initiative List */
.initiative-panel {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.combat-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.initiative-mode {
  display: flex;
  gap: 4px;
}

.mode-btn {
  padding: 4px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.mode-btn:hover { border-color: var(--border2); color: var(--text); }
.mode-btn.active { background: var(--blue-dim); border-color: var(--blue); color: #aac8ff; }

.ctrl-select {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 12px;
  padding: 4px 8px; cursor: pointer; height: 28px;
}
.ctrl-select:focus { outline: none; border-color: var(--accent-dim); }
.ctrl-select option { background: var(--bg2); }

.combatant-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* Combatant Card */
.combatant-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  overflow: hidden;
  transition: border-color 0.2s;
  position: relative;
}

.combatant-card.active-turn {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-dim), inset 0 0 30px rgba(200,169,110,0.04);
}

.combatant-card.active-turn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 3px 0 0 3px;
}

.combatant-card.dead { opacity: 0.45; filter: grayscale(0.6); }

.card-main {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
}

.init-badge {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  min-width: 36px;
  text-align: center;
  cursor: pointer;
  line-height: 1;
}
.init-badge input {
  width: 36px;
  background: var(--bg3);
  border: 1px solid var(--accent-dim);
  border-radius: 4px;
  color: var(--accent);
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 700;
  text-align: center;
  padding: 2px;
}

.thumb-wrap {
  width: 44px;
  height: 44px;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border2);
  flex-shrink: 0;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--text3);
  cursor: pointer;
  position: relative;
}
.thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
.thumb-wrap input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

.combatant-info { flex: 1; min-width: 0; }

.combatant-name {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.combatant-type {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.hp-bar-wrap {
  margin-top: 4px;
  height: 5px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}

.hp-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s, background 0.3s;
}

.stat-row {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  margin-top: 4px;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 3px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 12px;
  font-weight: 600;
}

.stat-chip .label { color: var(--text3); font-size: 10px; text-transform: uppercase; }
.stat-chip .val { color: var(--text); }
.stat-chip.ac .label { color: #5b8de8; }
.stat-chip.ac .val { color: #aac4ff; }
.stat-chip.hp-chip .label { color: var(--green); }
.stat-chip.hp-chip .val { color: #a0e8c0; }
.stat-chip.temp .label { color: var(--teal); }
.stat-chip.temp .val { color: #a0e8e4; }
.stat-chip.conc { background: rgba(155,114,207,0.15); border-color: var(--purple-dim); color: var(--purple); font-size: 11px; }
.stat-chip.leg { background: rgba(240,165,0,0.12); border-color: #7a5000; color: var(--amber); font-size: 11px; }

.conditions-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  padding: 0 10px 8px;
}

.cond-tag {
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 3px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: pointer;
}

.card-actions {
  display: flex;
  gap: 4px;
  align-items: center;
  margin-left: auto;
  flex-shrink: 0;
}

/* Right Panel */
.right-panel {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.panel-head {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-family: 'Cinzel', serif;
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.panel-body { padding: 10px 12px; }

/* Add Combatant Form */
.add-form { display: flex; flex-direction: column; gap: 8px; }

.form-row { display: flex; gap: 6px; }

.roll-init-row {
  display: flex;
  gap: 6px;
  align-items: flex-end;
}

/* Encounter Library */
.encounter-list { display: flex; flex-direction: column; gap: 6px; }

.encounter-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  cursor: pointer;
  transition: border-color 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.encounter-item:hover { border-color: var(--accent-dim); }

.encounter-name {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--text);
}
.encounter-count { font-size: 12px; color: var(--text3); }

/* Condition picker */
.cond-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.cond-option {
  padding: 3px 9px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.cond-option:hover { border-color: var(--border2); color: var(--text); }
.cond-option.selected { background: rgba(224,85,85,0.18); border-color: var(--red); color: #ffaaaa; }

/* Turn banner */
.turn-banner {
  background: linear-gradient(90deg, rgba(200,169,110,0.12) 0%, transparent 100%);
  border: 1px solid var(--accent-dim);
  border-radius: var(--radius);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.turn-banner-thumb {
  width: 36px; height: 36px;
  border-radius: var(--radius);
  object-fit: cover;
  border: 1px solid var(--accent-dim);
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text3); flex-shrink: 0; overflow: hidden;
}
.turn-banner-thumb img { width: 100%; height: 100%; object-fit: cover; }
.turn-banner-name { font-family: 'Cinzel', serif; font-size: 16px; color: var(--accent2); }
.turn-banner-sub { font-size: 12px; color: var(--text3); }

.on-deck { font-size: 12px; color: var(--text3); }
.on-deck span { color: var(--text2); font-weight: 600; }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 4px 0; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* Detail panel toggle bar */
.detail-toggle-bar {
  display: flex; gap: 5px; padding: 6px 12px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-wrap: wrap; align-items: center;
}
.detail-toggle-bar-label {
  font-size: 11px; color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.06em; margin-right: 4px; white-space: nowrap;
}
.field-toggle {
  padding: 2px 8px; border-radius: 3px; border: 1px solid var(--border);
  background: transparent; color: var(--text3); font-family: 'Rajdhani', sans-serif;
  font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.field-toggle.on { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }
.field-toggle:hover { border-color: var(--border2); color: var(--text); }

/* Expand button on card */
.card-expand-btn {
  padding: 3px 7px; border-radius: var(--radius); border: 1px solid var(--border);
  background: transparent; color: var(--text3); font-size: 12px; cursor: pointer;
  transition: all 0.15s; line-height: 1; flex-shrink: 0;
}
.card-expand-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
.card-expand-btn.open { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* Detail popup */
.detail-popup {
  position: fixed; z-index: 400;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius2); padding: 14px;
  width: 320px; max-height: 80vh; overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.detail-popup-name {
  font-family: 'Cinzel', serif; font-size: 14px; color: var(--accent);
  margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.detail-close {
  background: transparent; border: none; color: var(--text3);
  cursor: pointer; font-size: 16px; padding: 0 2px; transition: color 0.15s;
}
.detail-close:hover { color: var(--red); }
.detail-section { margin-bottom: 10px; }
.detail-section-title {
  font-size: 10px; color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 5px;
}

/* Ability scores in popup */
.ability-grid {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px;
}
.ability-cell {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px 2px; text-align: center;
}
.ability-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; }
.ability-score { font-size: 15px; color: var(--text); font-weight: 600; }
.ability-mod { font-size: 11px; color: var(--accent); }

/* Attacks in popup */
.attack-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; border-bottom: 1px solid var(--border);
}
.attack-row:last-child { border-bottom: none; }
.attack-name { flex: 1; font-size: 13px; color: var(--text); font-weight: 600; }
.attack-stats { font-size: 11px; color: var(--text2); }
.attack-roll-btn {
  padding: 3px 10px; border-radius: var(--radius); border: 1px solid var(--green-dim);
  background: transparent; color: var(--green); font-family: 'Rajdhani', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  text-transform: uppercase; white-space: nowrap;
}
.attack-roll-btn:hover { background: rgba(76,175,125,0.15); }
.attack-del-btn {
  background: transparent; border: none; color: var(--text3);
  cursor: pointer; font-size: 13px; padding: 2px 4px; transition: color 0.15s;
}
.attack-del-btn:hover { color: var(--red); }

/* Add attack form */
.add-attack-row {
  display: grid; grid-template-columns: 1fr 60px 1fr auto;
  gap: 4px; margin-top: 6px;
}
.atk-input {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 12px;
  padding: 4px 6px; width: 100%;
}
.atk-input:focus { outline: none; border-color: var(--accent-dim); }

/* Spell slots in popup */
.slot-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.slot-entry {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 3px 8px;
  font-size: 12px; text-align: center; min-width: 60px;
}
.slot-level { font-size: 10px; color: var(--text3); text-transform: uppercase; }
.slot-pips { display: flex; gap: 3px; justify-content: center; margin-top: 2px; flex-wrap: wrap; }
.slot-pip {
  width: 10px; height: 10px; border-radius: 50%;
  border: 1px solid var(--border2); background: var(--purple);
  cursor: pointer; transition: all 0.15s;
}
.slot-pip.used { background: var(--bg3); border-color: var(--border); }

/* Notes textarea in popup */
.detail-notes {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-family: 'Rajdhani', sans-serif;
  font-size: 13px; padding: 6px 8px; resize: vertical; min-height: 60px;
  line-height: 1.4;
}
.detail-notes:focus { outline: none; border-color: var(--accent-dim); }

/* Roll result popup */
.roll-popup {
  position: fixed; z-index: 500;
  background: var(--bg2); border: 1px solid var(--accent);
  border-radius: var(--radius2); padding: 10px 16px;
  pointer-events: none; text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.7);
  animation: rollPopIn 0.15s ease-out;
}
@keyframes rollPopIn {
  from { opacity: 0; transform: scale(0.85) translateY(-6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.roll-popup-attack { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.roll-popup-hit { font-family: 'Cinzel', serif; font-size: 28px; color: var(--amber); line-height: 1; }
.roll-popup-hit-label { font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
.roll-popup-dmg { font-family: 'Cinzel', serif; font-size: 22px; color: var(--red); line-height: 1; }
.roll-popup-dmg-label { font-size: 10px; color: var(--text3); text-transform: uppercase; }

/* Advantage toggle */
.adv-toggle {
  display: flex;
  gap: 4px;
}
.adv-btn {
  padding: 3px 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.adv-btn.adv.active { background: rgba(76,175,125,0.2); border-color: var(--green); color: var(--green); }
.adv-btn.dis.active { background: rgba(224,85,85,0.2); border-color: var(--red); color: var(--red); }

.section-title {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

.readied-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  background: rgba(91,141,232,0.18);
  border: 1px solid var(--blue-dim);
  color: var(--blue);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.delayed-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  background: rgba(155,114,207,0.18);
  border: 1px solid var(--purple-dim);
  color: var(--purple);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">⚔ Thekodia DM</div>
  <div class="nav-tabs">
    <button class="nav-tab active">Initiative</button>
    <button class="nav-tab" onclick="window.location='/thekodia-library.html'">Library</button>
    <button class="nav-tab" onclick="window.location='/thekodia-players.html'">Players</button>
    <button class="nav-tab" onclick="window.location='/thekodia-references.html'">References</button>
    <button class="nav-tab" onclick="window.location='/thekodia-clock.html'">Clock</button>
    <button class="nav-tab" onclick="window.location='/thekodia-tables.html'">Tables</button>
    <button class="nav-tab" onclick="window.location='/thekodia-dice.html'">Dice</button>
    <button class="nav-tab" onclick="ThekodiaStorage.exportBackup()" title="Export Backup">💾 Backup</button>
    <button class="nav-tab" onclick="document.getElementById('backupFileInput').click()" title="Import Backup">📂 Restore</button>
    <button class="nav-tab" onclick="if(confirm('Quit Thekodia?'))fetch('/shutdown',{method:'POST'}).then(()=>document.write('Thekodia has shut down. You may close this tab.'))" style="margin-left:auto;color:var(--red);border-color:var(--red-dim);">✕ Quit</button>
  </div>
</div>

<div class="main-layout">
  <!-- Left: Initiative List -->
  <div class="initiative-panel">
    <div class="combat-controls">
      <div class="initiative-mode">
        <button class="mode-btn active" onclick="setMode('standard',this)">Standard</button>
        <button class="mode-btn" onclick="setMode('group',this)">Group</button>
      </div>
      <button class="btn primary" onclick="openAddModal()">+ Add Combatant</button>
      <button class="btn" onclick="openEncounterModal()">Load Encounter</button>
      <button class="btn" onclick="sortInitiative()">Sort ↕</button>
      <button class="btn" onclick="syncFromLibrary()" title="Check for stat block updates in Library">⟳ Sync</button>
      <div id="groupControls" style="display:none;gap:6px;align-items:center">
        <select id="groupRollMode" class="ctrl-select" title="Roll method for groups"
                onchange="groupRollModeVal=this.value">
          <option value="one">One Roll</option>
          <option value="avg">Average</option>
          <option value="high">Highest</option>
        </select>
        <button class="btn" style="border-color:var(--amber);color:var(--amber)" onclick="rollGroupInitiative()">⚄ Roll Groups</button>
      </div>
      <button class="btn" onclick="window.open('http://localhost:5000/thekodia-player-display.html')">Player View</button>
    </div>

    <!-- Turn Banner -->
    <div class="turn-banner" id="turnBanner" style="display:none">
      <div class="turn-banner-thumb" id="bannerThumb">⚔</div>
      <div>
        <div class="turn-banner-name" id="bannerName">—</div>
        <div class="turn-banner-sub" id="bannerSub"></div>
      </div>
      <div style="margin-left:auto; text-align:right">
        <div class="on-deck" id="onDeck1"></div>
        <div class="on-deck" id="onDeck2"></div>
      </div>
    </div>

    <!-- Detail panel field toggles -->
    <div class="detail-toggle-bar">
      <span class="detail-toggle-bar-label">Show:</span>
      <button class="field-toggle on" id="tog_attacks" onclick="toggleField('attacks')">Attacks</button>
      <button class="field-toggle on" id="tog_stats" onclick="toggleField('stats')">Stats</button>
      <button class="field-toggle on" id="tog_slots" onclick="toggleField('slots')">Spell Slots</button>
      <button class="field-toggle on" id="tog_notes" onclick="toggleField('notes')">Notes</button>
      <button class="field-toggle on" id="tog_speed" onclick="toggleField('speed')">Speed</button>
      <div class="round-display">
        <span class="round-label">Round</span>
        <span class="round-num" id="roundNum">—</span>
        <button class="btn small" onclick="prevTurn()">◀ Prev</button>
        <button class="btn small" onclick="nextTurn()">Next Turn ▶</button>
        <button class="btn small danger" onclick="endCombat()">End Combat</button>
      </div>
    </div>

    <div class="combatant-list" id="combatantList">
      <div class="empty-state">
        <div class="big">No Combatants</div>
        Add combatants or load an encounter to begin
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">

    <!-- Quick HP Edit -->
    <div class="panel-box" id="quickEditBox" style="display:none">
      <div class="panel-head">Edit — <span id="quickEditName" style="color:var(--text)">—</span><button class="btn icon" onclick="closeQuickEdit()">✕</button></div>
      <div class="panel-body">
        <div class="form-row">
          <div class="field">
            <label>Initiative</label>
            <input type="number" id="quickInit" placeholder="—" onchange="applyInit()">
          </div>
          <div class="field">
            <label>AC</label>
            <input type="number" id="quickAC" placeholder="—" onchange="applyAC()">
          </div>
          <div class="field">

<script>
const CONDITIONS_5E = [
  {name:'Blinded',color:'#888'},
  {name:'Charmed',color:'#e8a0e8'},
  {name:'Deafened',color:'#999'},
  {name:'Frightened',color:'#e05555'},
  {name:'Grappled',color:'#c8a030'},
  {name:'Incapacitated',color:'#e07040'},
  {name:'Invisible',color:'#a0c8e8'},
  {name:'Paralyzed',color:'#e8c830'},
  {name:'Petrified',color:'#a0a090'},
  {name:'Poisoned',color:'#70c860'},
  {name:'Prone',color:'#c87840'},
  {name:'Restrained',color:'#c8a060'},
  {name:'Stunned',color:'#e8e840'},
  {name:'Unconscious',color:'#606060'},
  {name:'Exhaustion',color:'#e06040'},
  {name:'Healthy',color:'#70c860'},
  {name:'Hurt',color:'#e8e840'},
  {name:'Bloodied',color:'#e06040'}

];

let combatants = [];
let currentTurnIdx = -1;
let round = 0;
let combatMode = 'standard';
let selectedCombatantIdx = -1;
let editingIdx = -1;
let advMode = 'none';
let thumbData = {};
let openDetailIdx = -1;
let detailPopupEl = null;
let detailFields = { attacks: true, stats: true, slots: true, notes: true, speed: true };
const DETAIL_FIELDS_KEY = 'thekodia_detail_fields';

function getStorage() {
  try { return JSON.parse(localStorage.getItem('thekodia_encounters') || '[]'); } catch { return []; }
}
function setStorage(data) {
  try { localStorage.setItem('thekodia_encounters', JSON.stringify(data)); } catch {}
}

const LIVE_KEY = 'thekodia_live_combat';

function saveLiveState() {
  if (!combatants.length) return; // never overwrite good data with an empty list
  try {
    localStorage.setItem(LIVE_KEY, JSON.stringify({ combatants, currentTurnIdx, round }));
  } catch {
    // Quota exceeded — retry without thumbnail data
    try {
      const slim = combatants.map(c => { const {thumb, ...rest} = c; return rest; });
      localStorage.setItem(LIVE_KEY, JSON.stringify({ combatants: slim, currentTurnIdx, round }));
    } catch {}
  }
}

function loadLiveState() {
  let data;
  try {
    const raw = localStorage.getItem(LIVE_KEY);
    if (!raw) return;
    data = JSON.parse(raw);
  } catch { return; }
  if (!data || !Array.isArray(data.combatants) || !data.combatants.length) return;
  combatants = data.combatants;
  currentTurnIdx = typeof data.currentTurnIdx === 'number' ? data.currentTurnIdx : -1;
  round = typeof data.round === 'number' ? data.round : 0;
  renderList();
  if (round > 0) {
    document.getElementById('roundNum').textContent = round;
  }
}

function setMode(mode, el) {
  combatMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('groupControls').style.display = mode === 'group' ? 'flex' : 'none';
}

let groupRollModeVal = 'one';

function rollGroupInitiative() {
  if (!combatants.length) return;

  const buckets = {};
  const solo = [];
  combatants.forEach(c => {
    const key = c.group && c.group.trim() ? c.group.trim() : null;
    if (key) {
      if (!buckets[key]) buckets[key] = [];
      buckets[key].push(c);
    } else {
      solo.push(c);
    }
  });

  const lines = [];

  if (groupRollModeVal === 'one') {
    Object.entries(buckets).forEach(([key, members]) => {
      const roll = rollD20('none');
      members.forEach(c => c.init = roll);
      lines.push(`${key}: ${roll}`);
    });
  } else {
    Object.entries(buckets).forEach(([key, members]) => {
      const rolls = members.map(c => rollD20('none') + (c.initMod || 0));
      const result = groupRollModeVal === 'high'
        ? Math.max(...rolls)
        : Math.round(rolls.reduce((a, b) => a + b, 0) / rolls.length);
      members.forEach(c => c.init = result);
      const detail = rolls.map((r, i) => `${members[i].name}: ${r}`).join(', ');
      lines.push(`${key}: ${result}  (${detail})`);
    });
  }

  solo.forEach(c => { c.init = rollD20('none') + (c.initMod || 0); });

  sortInitiative();
  if (lines.length) alert('Group Initiative\n' + lines.join('\n'));
}

function rollD20(adv) {
  const r1 = Math.floor(Math.random()*20)+1;
  if (adv === 'adv') { const r2 = Math.floor(Math.random()*20)+1; return Math.max(r1,r2); }
  if (adv === 'dis') { const r2 = Math.floor(Math.random()*20)+1; return Math.min(r1,r2); }
  return r1;
}

function toggleAdv(mode) {
  if (advMode === mode) {
    advMode = 'none';
    document.getElementById('advBtn').classList.remove('active');
    document.getElementById('disBtn').classList.remove('active');
  } else {
    advMode = mode;
    document.getElementById('advBtn').classList.toggle('active', mode==='adv');
    document.getElementById('disBtn').classList.toggle('active', mode==='dis');
  }
}

function rollInit() {
  const mod = parseInt(document.getElementById('f_initmod').value)||0;
  const roll = rollD20(advMode) + mod;
  document.getElementById('f_init').value = roll;
}

function previewThumb(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    thumbData._pending = e.target.result;
    document.getElementById('thumbPreview').innerHTML =
      `<img src="${e.target.result}" style="width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid var(--border2)">`;
  };
  reader.readAsDataURL(input.files[0]);
}

function parseStatBlock() {
  const text = document.getElementById('f_paste').value;
  if (!text.trim()) return;
  const hpMatch = text.match(/Hit Points\s*(\d+)/i) || text.match(/HP[:\s]+(\d+)/i) || text.match(/(\d+)\s*\([\d\s+d]+\)\s*hit points/i);
  const acMatch = text.match(/Armor Class\s*(\d+)/i) || text.match(/AC[:\s]+(\d+)/i);
  const nameMatch = text.split('\n')[0].trim();
  if (nameMatch && !document.getElementById('f_name').value) document.getElementById('f_name').value = nameMatch;
  if (hpMatch) { document.getElementById('f_maxhp').value = hpMatch[1]; document.getElementById('f_hp').value = hpMatch[1]; }
  if (acMatch) document.getElementById('f_ac').value = acMatch[1];
}

function addCombatant() {
  const name = document.getElementById('f_name').value.trim();
  if (!name) return;
  const maxhp = parseInt(document.getElementById('f_maxhp').value)||0;
  const hp = parseInt(document.getElementById('f_hp').value)||maxhp;
  const count = parseInt(document.getElementById('f_count').value)||1;
  const leg = parseInt(document.getElementById('f_leg').value)||0;
  const base = {
    name, type: document.getElementById('f_type').value,
    init: parseInt(document.getElementById('f_init').value)||0,
    maxhp, hp, ac: parseInt(document.getElementById('f_ac').value)||0,
    temphp: parseInt(document.getElementById('f_temphp').value)||0,
    maxReduce: 0, conditions: [], notes: document.getElementById('f_notes').value,
    legMax: leg, legCurrent: leg, lairActions: document.getElementById('f_lair').value==='1',
    conc: false, readied: false, delayed: false, dead: false,
    thumb: thumbData._pending||null,
    group: document.getElementById('f_group').value.trim()
  };
  if (count > 1 && base.type !== 'player') {
    for (let i=1;i<=count;i++) {
      combatants.push({...base, name:`${name} ${i}`, id: Date.now()+i});
    }
  } else {
    combatants.push({...base, id: Date.now()});
  }
  thumbData._pending = null;
  closeModal('addModal');
  renderList();
}

function renderList() {
  saveLiveState();
  const list = document.getElementById('combatantList');
  if (!combatants.length) {
    list.innerHTML = '<div class="empty-state"><div class="big">No Combatants</div>Add combatants or load an encounter to begin</div>';
    document.getElementById('turnBanner').style.display='none';
    document.getElementById('roundNum').textContent='—';
    return;
  }
  list.innerHTML = combatants.map((c,i) => renderCard(c,i)).join('');
  updateBanner();
  renderEncounterList();
}

function hpColor(pct) {
  if (pct > 0.6) return 'var(--green)';
  if (pct > 0.3) return 'var(--amber)';
  return 'var(--red)';
}

function renderCard(c, i) {
  const effectiveMax = Math.max(1, c.maxhp - (c.maxReduce||0));
  const pct = Math.min(1, Math.max(0, c.hp / effectiveMax));
  const isActive = i === currentTurnIdx;
  const thumbHtml = c.thumb
    ? `<img src="${c.thumb}" style="width:100%;height:100%;object-fit:cover">`
    : (c.type==='player'?'🧙':c.type==='npc'?'🗣':'💀');

  const condBadges = (c.conditions||[]).map(cond => {
    const cf = CONDITIONS_5E.find(x=>x.name===cond)||{color:'#888'};
    return `<span class="cond-tag" style="background:${cf.color}22;border:1px solid ${cf.color}66;color:${cf.color}" onclick="quickRemoveCond(${i},'${cond}')">${cond}</span>`;
  }).join('');

  const extras = [];
  if (c.conc) extras.push(`<span class="stat-chip conc">◉ Conc</span>`);
  if (c.legMax) extras.push(`<span class="stat-chip leg">★ ${c.legCurrent}/${c.legMax} Leg</span>`);
  if (c.readied) extras.push(`<span class="readied-badge">Readied</span>`);
  if (c.delayed) extras.push(`<span class="delayed-badge">Delayed</span>`);

  return `
  <div class="combatant-card${isActive?' active-turn':''}${c.dead?' dead':''}" id="card_${i}">
    <div class="card-main">
      <div class="init-badge" id="initBadge_${i}" onclick="editInitInline(${i})">${c.init}</div>
      <div class="thumb-wrap" title="Click to change image">
        ${thumbHtml}
        <input type="file" accept="image/*" id="thumbInput_${i}" onchange="uploadThumb(${i},this)" style="position:absolute;inset:0;opacity:0;cursor:pointer">
      </div>
      <div class="combatant-info">
        <div class="combatant-name">${c.name}</div>
        <div class="combatant-type">${c.type}${c.lairActions?' · Lair':''}${c.group?' · <span style="color:var(--amber)">'+c.group+'</span>':''}</div>
        <div class="stat-row">
          <span class="stat-chip ac"><span class="label">AC</span><span class="val">${c.ac}</span></span>
          <span class="stat-chip hp-chip"><span class="label">HP</span><span class="val">${c.hp}/${Math.max(1,c.maxhp-(c.maxReduce||0))}</span></span>
          ${c.temphp>0?`<span class="stat-chip temp"><span class="label">TMP</span><span class="val">+${c.temphp}</span></span>`:''}
          ${extras.join('')}
        </div>
        <div class="hp-bar-wrap"><div class="hp-bar" style="width:${Math.round(pct*100)}%;background:${hpColor(pct)}"></div></div>
      </div>
      <div class="card-actions">
        <button class="btn icon" title="Select for quick edit" onclick="selectCombatant(${i})">✏</button>
        <button class="btn icon" title="Full edit" onclick="openEditModal(${i})">⚙</button>
        <button class="btn icon" title="Toggle dead/alive" onclick="toggleDead(${i})">☠</button>
        <button class="btn icon" title="Move up" onclick="moveCard(${i},-1)">▲</button>
        <button class="btn icon" title="Move down" onclick="moveCard(${i},1)">▼</button>
        <button class="card-expand-btn${openDetailIdx===i?' open':''}" id="expandBtn_${i}" title="Show details" onclick="toggleDetail(${i}, this)">◀</button>
      </div>
    </div>
    ${condBadges ? `<div class="conditions-row">${condBadges}</div>` : ''}
    ${c.notes ? `<div style="padding:0 10px 6px;font-size:12px;color:var(--text3)">${c.notes}</div>` : ''}
  </div>`;
}

function editInitInline(i) {
  const badge = document.getElementById('initBadge_'+i);
  const cur = combatants[i].init;
  badge.innerHTML = `<input type="number" value="${cur}" onblur="saveInitInline(${i},this)" onkeydown="if(event.key==='Enter')this.blur()" autofocus>`;
  badge.querySelector('input').focus();
}

function saveInitInline(i, input) {
  combatants[i].init = parseInt(input.value)||0;
  renderList();
}

function uploadThumb(i, input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => { combatants[i].thumb = e.target.result; renderList(); };
  reader.readAsDataURL(input.files[0]);
}

function closeQuickEdit() {
  selectedCombatantIdx = -1;
  document.getElementById('quickEditBox').style.display = 'none';
  document.getElementById('legBox').style.display = 'none';
}

function selectCombatant(i) {
  selectedCombatantIdx = i;
  const c = combatants[i];
  document.getElementById('quickEditBox').style.display='block';
  document.getElementById('quickEditName').textContent = c.name;
  document.getElementById('quickInit').value = c.init;
  document.getElementById('quickAC').value = c.ac;
  document.getElementById('quickMaxHP').value = c.maxhp;
  document.getElementById('quickHpDelta').value = '';
  document.getElementById('quickTempHp').value = c.temphp||0;
  document.getElementById('quickMaxReduce').value = c.maxReduce||0;
  document.getElementById('quickGroup').value = c.group||'';
  renderQuickCondPicker(i);
  if (c.legMax) {
    document.getElementById('legBox').style.display='block';
    document.getElementById('legName').textContent = c.name;
    renderLegActions(i);
  } else {
    document.getElementById('legBox').style.display='none';
  }
  document.getElementById('card_'+i).scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderQuickCondPicker(i) {
  const c = combatants[i];
  document.getElementById('quickCondPicker').innerHTML = CONDITIONS_5E.map(cond =>
    `<span class="cond-option${(c.conditions||[]).includes(cond.name)?' selected':''}"
      onclick="toggleCond(${i},'${cond.name}',this)">${cond.name}</span>`
  ).join('');
}

const MUTEX_CONDS = [['Healthy','Hurt','Bloodied']];

function toggleCond(i, name, el) {
  const c = combatants[i];
  if (!c.conditions) c.conditions=[];
  const idx = c.conditions.indexOf(name);
  if (idx>-1) {
    c.conditions.splice(idx,1);
  } else {
    // Remove any mutually exclusive partner before adding
    const group = MUTEX_CONDS.find(g => g.includes(name));
    if (group) group.forEach(other => {
      if (other !== name) c.conditions = c.conditions.filter(x => x !== other);
    });
    c.conditions.push(name);
  }
  el.classList.toggle('selected', c.conditions.includes(name));
  renderList();
  renderQuickCondPicker(i);
}

function quickRemoveCond(i, name) {
  combatants[i].conditions = (combatants[i].conditions||[]).filter(c=>c!==name);
  renderList();
  if (selectedCombatantIdx===i) renderQuickCondPicker(i);
}

function applyInit() {
  if (selectedCombatantIdx<0) return;
  combatants[selectedCombatantIdx].init = parseInt(document.getElementById('quickInit').value)||0;
  renderList();
}
function applyAC() {
  if (selectedCombatantIdx<0) return;
  combatants[selectedCombatantIdx].ac = parseInt(document.getElementById('quickAC').value)||0;
  renderList();
}
function applyMaxHP() {
  if (selectedCombatantIdx<0) return;
  const newMax = parseInt(document.getElementById('quickMaxHP').value)||0;
  combatants[selectedCombatantIdx].maxhp = newMax;
  if (combatants[selectedCombatantIdx].hp > newMax) combatants[selectedCombatantIdx].hp = newMax;
  renderList();
}
function applyHP(sign) {
  if (selectedCombatantIdx<0) return;
  const delta = parseInt(document.getElementById('quickHpDelta').value)||0;
  const c = combatants[selectedCombatantIdx];
  if (sign<0 && c.temphp>0) {
    const absorbed = Math.min(c.temphp, delta);
    c.temphp -= absorbed;
    const remainder = delta - absorbed;
    c.hp = Math.max(0, c.hp - remainder);
  } else {
    const effectiveMax = Math.max(1, c.maxhp - (c.maxReduce||0));
    c.hp = Math.min(effectiveMax, Math.max(0, c.hp + sign*delta));
  }
  if (c.hp<=0) c.dead=true;
  document.getElementById('quickTempHp').value = c.temphp;
  renderList();
}

function applyTempHP() {
  if (selectedCombatantIdx<0) return;
  combatants[selectedCombatantIdx].temphp = parseInt(document.getElementById('quickTempHp').value)||0;
  renderList();
}

function applyMaxReduce() {

function moveCard(i, dir) {
  const j = i+dir;
  if (j<0||j>=combatants.length) return;
  [combatants[i],combatants[j]] = [combatants[j],combatants[i]];
  if (currentTurnIdx===i) currentTurnIdx=j;
  else if (currentTurnIdx===j) currentTurnIdx=i;
  renderList();
}

function sortInitiative() {
  combatants.sort((a,b) => b.init - a.init);
  if (currentTurnIdx>=0) {
    const activeId = combatants[currentTurnIdx]?.id;
    currentTurnIdx = combatants.findIndex(c=>c.id===activeId);
  }
  renderList();
}

function pushDisplayState() {
  try {
    let existingMode = 'ambient';
    try {
      const ex = JSON.parse(localStorage.getItem('thekodia_display_state') || '{}');
      if (ex.mode) existingMode = ex.mode;
    } catch {}

    if (!combatants.length || currentTurnIdx < 0) {
      localStorage.setItem('thekodia_display_state', JSON.stringify({ active: false, mode: existingMode }));
      return;
    }
    const CONDITIONS_COLORS = {};
    CONDITIONS_5E.forEach(c => { CONDITIONS_COLORS[c.name] = c.color; });

    const makeCombatant = (c) => {
      if (!c) return null;
      const isPlayer = c.type === 'player';
      const effectiveMax = Math.max(1, c.maxhp - (c.maxReduce||0));
      return {
        displayName: c.name,
        type: c.type,
        thumb: c.thumb,
        conditions: (c.conditions||[]).map(name => ({ name, color: CONDITIONS_COLORS[name]||'#888' })),
        hpPct: isPlayer ? (c.hp / effectiveMax) : undefined
      };
    };

    const current = combatants[currentTurnIdx];
    let deck = combatants.slice(currentTurnIdx+1).filter(x=>!x.dead);
    if (deck.length < 2) deck = [...deck, ...combatants.slice(0, currentTurnIdx).filter(x=>!x.dead)];

    localStorage.setItem('thekodia_display_state', JSON.stringify({
      active: true,
      mode: existingMode,
      round,
      current: makeCombatant(current),
      deck: deck.slice(0,2).map(makeCombatant)
    }));
  } catch(e) {}
}

function prevTurn() {
  if (!combatants.length || currentTurnIdx < 0) return;
  let prev = currentTurnIdx - 1;
  while (prev >= 0 && combatants[prev].dead) prev--;
  if (prev < 0) {
    prev = combatants.length - 1;
    while (prev > 0 && combatants[prev].dead) prev--;
    if (round > 1) round--;
  }
  currentTurnIdx = prev;
  document.getElementById('roundNum').textContent = round;
  document.getElementById('turnBanner').style.display = 'flex';
  pushDisplayState();
  renderList();
  const card = document.getElementById('card_' + currentTurnIdx);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextTurn() {
  if (!combatants.length) return;
  if (round===0) { round=1; }
  const active = combatants.filter(c=>!c.dead);
  if (!active.length) return;
  if (currentTurnIdx<0) {
    currentTurnIdx = 0;
  } else {
    let next = currentTurnIdx+1;
    while (next<combatants.length && combatants[next].dead) next++;
    if (next>=combatants.length) { next=0; round++; resetLegActionsAll(); }
    while (next<combatants.length && combatants[next].dead) next++;
    currentTurnIdx = next;
  }
  document.getElementById('roundNum').textContent = round;
  document.getElementById('turnBanner').style.display='flex';
  pushDisplayState();
  renderList();
  const card = document.getElementById('card_'+currentTurnIdx);
  if (card) card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function resetLegActionsAll() {
  combatants.forEach(c => { if (c.legMax) c.legCurrent = c.legMax; });
}

function updateBanner() {
  if (currentTurnIdx<0||!combatants.length) return;
  const c = combatants[currentTurnIdx];
  if (!c) return;
  document.getElementById('turnBanner').style.display='flex';
  document.getElementById('roundNum').textContent = round||'—';
  const thumb = document.getElementById('bannerThumb');
  if (c.thumb) thumb.innerHTML=`<img src="${c.thumb}">`;
  else thumb.innerHTML = c.type==='player'?'🧙':c.type==='npc'?'🗣':'💀';
  document.getElementById('bannerName').textContent = c.name;
  document.getElementById('bannerSub').textContent = `${c.type} · AC ${c.ac} · HP ${c.hp}`;

  let deck = combatants.slice(currentTurnIdx+1).filter(x=>!x.dead);
  if (deck.length<2) deck = [...deck, ...combatants.slice(0,currentTurnIdx).filter(x=>!x.dead)];
  document.getElementById('onDeck1').innerHTML = deck[0]?`On Deck: <span>${deck[0].name}</span>`:'';
  document.getElementById('onDeck2').innerHTML = deck[1]?`Then: <span>${deck[1].name}</span>`:'';
}

// ── DETAIL PANEL ─────────────────────────────────────────

function loadDetailFields() {
  try {
    const raw = localStorage.getItem(DETAIL_FIELDS_KEY);
    if (raw) detailFields = { ...detailFields, ...JSON.parse(raw) };
  } catch {}
  // Sync toggle button states
  Object.keys(detailFields).forEach(f => {
    const btn = document.getElementById('tog_' + f);
    if (btn) btn.classList.toggle('on', detailFields[f]);
  });
}

function toggleField(field) {
  detailFields[field] = !detailFields[field];
  const btn = document.getElementById('tog_' + field);
  if (btn) btn.classList.toggle('on', detailFields[field]);
  try { localStorage.setItem(DETAIL_FIELDS_KEY, JSON.stringify(detailFields)); } catch {}
  // Refresh open popup if any
  if (openDetailIdx >= 0 && detailPopupEl) renderDetailContent(openDetailIdx);
}

function toggleDetail(idx, btnEl) {
  if (openDetailIdx === idx) {
    closeDetail();
    return;
  }
  openDetailIdx = idx;
  // Close any existing popup
  if (detailPopupEl) detailPopupEl.remove();

  // Create popup
  detailPopupEl = document.createElement('div');
  detailPopupEl.className = 'detail-popup';
  detailPopupEl.id = 'detailPopup';
  document.body.appendChild(detailPopupEl);

  positionDetailPopup(btnEl);
  renderDetailContent(idx);

  // Update all expand buttons
  renderList();
}

function positionDetailPopup(btnEl) {
  if (!detailPopupEl || !btnEl) return;
  const rect = btnEl.getBoundingClientRect();
  const popupW = 320;
  const margin = 8;
  let left = rect.right + margin;
  let top = rect.top;
  // Clamp to viewport
  if (left + popupW > window.innerWidth - margin) left = rect.left - popupW - margin;
  if (top + 400 > window.innerHeight - margin) top = window.innerHeight - 400 - margin;
  if (top < margin) top = margin;
  detailPopupEl.style.left = left + 'px';
  detailPopupEl.style.top = top + 'px';
}

function closeDetail() {
  openDetailIdx = -1;
  if (detailPopupEl) { detailPopupEl.remove(); detailPopupEl = null; }
  renderList();
}

function renderDetailContent(idx) {
  const c = combatants[idx];
  if (!c || !detailPopupEl) return;

  const mod = s => Math.floor((s - 10) / 2);
  const modStr = s => { const m = mod(s); return (m >= 0 ? '+' : '') + m; };

  let html = `
    <div class="detail-popup-name">
      <span>${c.name}</span>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>`;

  // Speed
  if (detailFields.speed && c.speed) {
    html += `<div style="font-size:12px;color:var(--text2);margin-bottom:8px">
      🏃 <strong>${c.speed} ft</strong>
      ${c.proficiencyBonus ? `&nbsp;·&nbsp; Prof <strong>+${c.proficiencyBonus}</strong>` : ''}
      ${c.classes ? `&nbsp;·&nbsp; <span style="color:var(--text3)">${c.classes}</span>` : ''}
    </div>`;
  }

  // Ability scores
  if (detailFields.stats && (c.str || c.dex || c.con || c.int || c.wis || c.cha)) {
    const stats = [
      {label:'STR', val: c.str||10},
      {label:'DEX', val: c.dex||10},
      {label:'CON', val: c.con||10},
      {label:'INT', val: c.int||10},
      {label:'WIS', val: c.wis||10},
      {label:'CHA', val: c.cha||10},
    ];
    html += `<div class="detail-section">
      <div class="detail-section-title">Ability Scores</div>
      <div class="ability-grid">${stats.map(s => `
        <div class="ability-cell">
          <div class="ability-label">${s.label}</div>
          <div class="ability-score">${s.val}</div>
          <div class="ability-mod">${modStr(s.val)}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  // Attacks
  if (detailFields.attacks) {
    const attacks = c.attacks || [];
    html += `<div class="detail-section">
      <div class="detail-section-title">Attacks</div>
      <div id="attackList_${idx}">
        ${attacks.length ? attacks.map((a, ai) => `
          <div class="attack-row">
            <div>
              <div class="attack-name">${a.name}</div>
              <div class="attack-stats">${a.hit} to hit · ${a.damage}</div>
            </div>
            <div style="display:flex;gap:3px">
              <button class="attack-roll-btn" onclick="rollHit(${idx},${ai})">🎲 Hit</button>
              <button class="attack-roll-btn" style="border-color:#7a5000;color:var(--amber)" onclick="rollDamage(${idx},${ai})">Dmg</button>
              <button class="attack-roll-btn" style="border-color:var(--border2);color:var(--text2)" onclick="rollAttack(${idx},${ai})">Both</button>
            </div>
            <button class="attack-del-btn" onclick="deleteAttack(${idx},${ai})" title="Remove">✕</button>
          </div>`).join('') : '<div style="font-size:12px;color:var(--text3)">No attacks defined</div>'}
      </div>
      <div class="add-attack-row" style="margin-top:8px">
        <input class="atk-input" id="atkName_${idx}" placeholder="Name">
        <input class="atk-input" id="atkHit_${idx}" placeholder="+5">
        <input class="atk-input" id="atkDmg_${idx}" placeholder="1d6+3 Piercing">
        <button class="btn small primary" onclick="addAttack(${idx})">+</button>
      </div>
    </div>`;
  }

  // Spell slots
  if (detailFields.slots && c.spellSlots && c.spellSlots.some(s => s && s.max > 0)) {
    const ordinals = ['1st','2nd','3rd','4th','5th','6th','7th','8th','9th'];
    html += `<div class="detail-section">
      <div class="detail-section-title">Spell Slots</div>
      <div class="slot-grid">
        ${c.spellSlots.map((s, lvl) => {
          if (!s || s.max === 0) return '';
          const pips = Array.from({length: s.max}, (_, pi) =>
            `<div class="slot-pip${pi < (s.used||0) ? ' used' : ''}" onclick="toggleSlotPip(${idx},${lvl},${pi})"></div>`
          ).join('');
          return `<div class="slot-entry">
            <div class="slot-level">${ordinals[lvl]}</div>
            <div class="slot-pips">${pips}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Notes
  if (detailFields.notes) {
    html += `<div class="detail-section">
      <div class="detail-section-title">Notes</div>
      <textarea class="detail-notes" id="detailNotes_${idx}"
        oninput="updateDetailNotes(${idx},this.value)"
        placeholder="Spells remaining, conditions, reminders..."
        >${(c.notes||'').replace(/</g,'&lt;')}</textarea>
    </div>`;
  }

  detailPopupEl.innerHTML = html;
}

// ── Detail panel actions ──────────────────────────────────

function addAttack(idx) {
  const c = combatants[idx];
  if (!c) return;
  const name = document.getElementById(`atkName_${idx}`)?.value.trim();
  const hit  = document.getElementById(`atkHit_${idx}`)?.value.trim();
  const dmg  = document.getElementById(`atkDmg_${idx}`)?.value.trim();
  if (!name) return;
  if (!c.attacks) c.attacks = [];
  c.attacks.push({ name, hit: hit||'+0', damage: dmg||'—' });
  saveCombatants();
  renderDetailContent(idx);
}

function deleteAttack(idx, atkIdx) {
  const c = combatants[idx];
  if (!c || !c.attacks) return;
  c.attacks.splice(atkIdx, 1);
  saveCombatants();
  renderDetailContent(idx);
}

function updateDetailNotes(idx, value) {
  combatants[idx].notes = value;
  saveCombatants();
}

function toggleSlotPip(idx, lvl, pip) {
  const c = combatants[idx];
  if (!c || !c.spellSlots || !c.spellSlots[lvl]) return;
  const slot = c.spellSlots[lvl];
  // Toggle: if pip < used, reduce used; if pip >= used, increase used
  slot.used = pip < slot.used ? pip : pip + 1;
  saveCombatants();
  renderDetailContent(idx);
}

// ── Attack roller ─────────────────────────────────────────

function rollAttack(combatantIdx, atkIdx) {
  const c = combatants[combatantIdx];
  if (!c || !c.attacks) return;
  const atk = c.attacks[atkIdx];
  if (!atk) return;
  const d20 = Math.floor(Math.random() * 20) + 1;
  const hitMod = parseInt((atk.hit || '+0').replace('+','')) || 0;
  const isCrit = d20 === 20;
  const isMiss = d20 === 1;
  showRollPopup(atk.name, d20 + hitMod, rollDamageStr(atk.damage, isCrit), isCrit, isMiss);
}

function rollHit(combatantIdx, atkIdx) {
  const c = combatants[combatantIdx];
  if (!c || !c.attacks) return;
  const atk = c.attacks[atkIdx];
  if (!atk) return;
  const d20 = Math.floor(Math.random() * 20) + 1;
  const hitMod = parseInt((atk.hit || '+0').replace('+','')) || 0;
  showRollPopup(atk.name, d20 + hitMod, null, d20 === 20, d20 === 1);
}

function rollDamage(combatantIdx, atkIdx) {
  const c = combatants[combatantIdx];
  if (!c || !c.attacks) return;
  const atk = c.attacks[atkIdx];
  if (!atk) return;
  showRollPopup(atk.name, null, rollDamageStr(atk.damage, false), false, false);
}

function rollDamageStr(dmgStr, crit) {
  // Parse "1d6+3 Piercing" or "2d10 Fire" etc.
  let total = 0;
  const diceMatches = [...(dmgStr||'').matchAll(/(\d+)d(\d+)/gi)];
  for (const m of diceMatches) {
    const count = parseInt(m[1]) * (crit ? 2 : 1);
    const sides = parseInt(m[2]);
    for (let i = 0; i < count; i++) total += Math.floor(Math.random() * sides) + 1;
  }
  const flatMatch = dmgStr?.match(/[+-]\s*(\d+)(?!\s*d)/i);
  if (flatMatch) total += parseInt(flatMatch[0].replace(/\s/g,''));
  return total || '—';
}

function showRollPopup(atkName, hit, dmg, crit, miss) {
  // Remove any existing roll popup
  const existing = document.getElementById('rollResultPopup');
  if (existing) existing.remove();

  const popup = document.createElement('div');
  popup.className = 'roll-popup';
  popup.id = 'rollResultPopup';

  const hitColor = crit ? 'var(--green)' : miss ? 'var(--red)' : 'var(--amber)';
  popup.innerHTML = `
    <div class="roll-popup-attack">${atkName}</div>
    ${hit !== null ? `
    <div class="roll-popup-hit-label">To Hit</div>
    <div class="roll-popup-hit" style="color:${hitColor}">${hit}${crit?' ★':miss?' ✕':''}</div>` : ''}
    ${dmg !== null ? `
    <div class="roll-popup-dmg-label" style="margin-top:${hit !== null ? 6 : 0}px">Damage</div>
    <div class="roll-popup-dmg">${dmg}</div>` : ''}`;

  // Position in center of detail popup if open, else center of screen
  document.body.appendChild(popup);
  if (detailPopupEl) {
    const r = detailPopupEl.getBoundingClientRect();
    popup.style.left = (r.left + r.width/2 - 90) + 'px';
    popup.style.top  = (r.top + 40) + 'px';
  } else {
    popup.style.left = (window.innerWidth/2 - 90) + 'px';
    popup.style.top  = (window.innerHeight/2 - 60) + 'px';
  }

  // Auto-dismiss after 3s
  setTimeout(() => { if (popup.parentNode) popup.remove(); }, 3000);
}

// ── SYNC FROM LIBRARY ────────────────────────────────────

let syncDiffs = [];

const SYNC_STAT_FIELDS = ['ac', 'str', 'dex', 'con', 'int', 'wis', 'cha', 'speed', 'legMax'];
const SYNC_FIELD_LABELS = {
  name: 'Name',
  maxhp: 'Max HP', ac: 'AC', str: 'STR', dex: 'DEX', con: 'CON',
  int: 'INT', wis: 'WIS', cha: 'CHA', speed: 'Speed',
  legMax: 'Leg. Actions', lairActions: 'Lair Actions',
  attacks: 'Attacks', thumb: 'Image'
};

function syncFromLibrary() {
  let library = [];
  try { library = JSON.parse(localStorage.getItem('thekodia_library') || '[]'); } catch {}
  if (!library.length) { alert('Library is empty — add creatures in the Library tab first.'); return; }

  syncDiffs = [];
  combatants.forEach((c, i) => {
    if (!c.libraryId) return;
    const src = library.find(l => l.id === c.libraryId);
    if (!src) return;

    const changes = [];

    const baseName = c.name.replace(/\s+\d+$/, '');
    if (baseName !== src.name && c.name !== src.name) {
      const suffix = c.name.slice(baseName.length);
      changes.push({ field: 'name', from: c.name, to: src.name + suffix });
    }

    if ((src.maxhp ?? 0) !== (c.maxhp ?? 0))
      changes.push({ field: 'maxhp', from: c.maxhp, to: src.maxhp });

    SYNC_STAT_FIELDS.forEach(f => {
      if ((src[f] ?? null) != (c[f] ?? null))
        changes.push({ field: f, from: c[f], to: src[f] });
    });

    const libAttacks = JSON.stringify(src.attacks || []);
    const combatAttacks = JSON.stringify(c.attacks || []);
    if (libAttacks !== combatAttacks)
      changes.push({ field: 'attacks', from: null, to: null });

    const libLair = !!src.lairActs;
    if (libLair !== !!c.lairActions)
      changes.push({ field: 'lairActions', from: c.lairActions, to: libLair });

    if ((src.thumb || null) !== (c.thumb || null))
      changes.push({ field: 'thumb', from: null, to: null });

    if (changes.length) syncDiffs.push({ idx: i, name: c.name, libraryName: src.name, changes, src });
  });

  if (!syncDiffs.length) {
    const linked = combatants.filter(c => c.libraryId).length;
    if (!linked) alert('No combatants are linked to the Library. Load an encounter from the Library tab to enable syncing.');
    else alert('All linked combatants are already up to date with the Library.');
    return;
  }

  const body = document.getElementById('syncModalBody');
  body.innerHTML = `
    <div style="font-size:13px;color:var(--text2);margin-bottom:12px">
      ${syncDiffs.length} combatant${syncDiffs.length > 1 ? 's have' : ' has'} updated stat blocks in the Library.
      Combat state (current HP, conditions, initiative) will be preserved.
    </div>
    ${syncDiffs.map((d, di) => `
      <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;
        background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
        padding:10px;margin-bottom:7px">
        <input type="checkbox" id="syncCheck_${di}" checked style="margin-top:3px;flex-shrink:0">
        <div style="flex:1;min-width:0">
          <div style="font-family:'Cinzel',serif;font-size:13px;color:var(--text);margin-bottom:6px">
            ${d.name}${d.name !== d.libraryName ? `<span style="font-size:11px;color:var(--text3)"> (lib: ${d.libraryName})</span>` : ''}
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">
            ${d.changes.map(ch => {
              const label = SYNC_FIELD_LABELS[ch.field] || ch.field;
              if (ch.from === null) return `<span style="font-size:11px;padding:2px 7px;border-radius:3px;background:rgba(200,169,110,0.15);border:1px solid var(--accent-dim);color:var(--accent2)">${label} updated</span>`;
              return `<span style="font-size:11px;padding:2px 7px;border-radius:3px;background:rgba(200,169,110,0.15);border:1px solid var(--accent-dim);color:var(--accent2)">${label}: ${ch.from} → ${ch.to}</span>`;
            }).join('')}
          </div>
        </div>
      </label>`).join('')}`;
  openModal('syncModal');
}

function performSync() {
  syncDiffs.forEach((d, di) => {
    const chk = document.getElementById(`syncCheck_${di}`);
    if (!chk || !chk.checked) return;
    const c = combatants[d.idx];
    if (!c) return;
    const src = d.src;

    const nameChange = d.changes.find(ch => ch.field === 'name');
    if (nameChange) c.name = nameChange.to;

    const maxHpChange = d.changes.find(ch => ch.field === 'maxhp');
    if (maxHpChange) {
      const oldMax = c.maxhp || 1;
      const newMax = src.maxhp;
      c.hp = Math.min(newMax, Math.round(c.hp * (newMax / oldMax)));
      c.maxhp = newMax;
    }

    SYNC_STAT_FIELDS.forEach(f => {
      if (d.changes.find(ch => ch.field === f) && src[f] !== undefined) c[f] = src[f];
    });

    if (d.changes.find(ch => ch.field === 'attacks'))
      c.attacks = Array.isArray(src.attacks) ? src.attacks.map(a => ({...a})) : [];

    if (d.changes.find(ch => ch.field === 'lairActions'))
      c.lairActions = !!src.lairActs;

    if (d.changes.find(ch => ch.field === 'thumb'))
      c.thumb = src.thumb || null;

    if (d.changes.find(ch => ch.field === 'legMax'))
      c.legCurrent = Math.min(c.legCurrent ?? c.legMax, c.legMax);
  });

  closeModal('syncModal');
  renderList();
  saveLiveState();
}

// Close detail popup when clicking outside
document.addEventListener('click', e => {
  if (!detailPopupEl) return;
  if (detailPopupEl.contains(e.target)) return;
  if (e.target.classList.contains('card-expand-btn')) return;
  closeDetail();
});

// ── Groups ───────────────────────────────────────────────
let customGroups = [];

function loadGroups() {
  try { customGroups = JSON.parse(localStorage.getItem('thekodia_groups') || '[]'); } catch { customGroups = []; }
  const sel = document.getElementById('quickGroup');
  if (!sel) return;
  while (sel.options.length > 3) sel.remove(3); // preserve: None, Player Character Team, Monsters
  customGroups.forEach(g => sel.appendChild(new Option(g, g)));
}

window.addEventListener('storage', e => { if (e.key === 'thekodia_groups') loadGroups(); });

// ── Init ─────────────────────────────────────────────────
loadDetailFields();
loadLiveState();
loadGroups();

// Re-restore if browser serves page from back/forward cache
window.addEventListener('pageshow', (e) => { if (e.persisted) { loadLiveState(); loadGroups(); } });

// Poll for live combatant additions from Library / Players tabs
setInterval(() => {
  try {
    const raw = localStorage.getItem('thekodia_live_add');
    if (!raw) return;
    localStorage.removeItem('thekodia_live_add');
    const incoming = JSON.parse(raw);
    if (!incoming) return;
    const items = Array.isArray(incoming) ? incoming : [incoming];
    let added = false;
    items.forEach(item => {
      if (!item || !item.name) return;
      item.id = Date.now() + Math.random();
      combatants.push(item);
      added = true;
    });
    if (added) { pushDisplayState(); renderList(); }
  } catch {}
}, 1000);
</script>
