<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thekodia — Player Display</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="thekodia.css">
  <style>
:root {
  --bg: #0a0c10;
  --bg2: #0f1219;
  --bg3: #161a24;
  --border: #1e2535;
  --border2: #2a3448;
  --accent: #c8a96e;
  --accent2: #e8c97e;
  --accent-dim: #5a4428;
  --red: #e05555;
  --green: #4caf7d;
  --blue: #5b8de8;
  --purple: #9b72cf;
  --teal: #4ecdc4;
  --amber: #f0a500;
  --text: #e8e0d0;
  --text2: #8a8070;
  --text3: #3a3428;
  --bar-h: 18vh;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  user-select: none;
}

/* ── BARS ─────────────────────────────────────────────── */
.display-bar {
  height: var(--bar-h);
  background: var(--bg2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  position: relative;
  overflow: hidden;
}

.display-bar::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 60px,
    rgba(200,169,110,0.015) 60px,
    rgba(200,169,110,0.015) 61px
  );
  pointer-events: none;
}

.bar-top { border-bottom: 2px solid var(--border2); transform: rotate(180deg); }
.bar-top > * { transform: rotate(180deg); }
.bar-bottom { border-top: 2px solid var(--border2); }

/* ── MIDDLE AREA ──────────────────────────────────────── */
.middle-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ── COMBAT MODE ─────────────────────────────────────── */
.combat-view {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 12px 24px;
}

.round-badge {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--text2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.active-turn-block {
  display: flex;
  align-items: center;
  gap: 16px;
  background: linear-gradient(90deg, rgba(200,169,110,0.08), transparent);
  border: 1px solid var(--accent-dim);
  border-radius: 10px;
  padding: 10px 20px 10px 12px;
  width: 100%;
  max-width: 600px;
}

.active-thumb {
  width: 52px; height: 52px;
  border-radius: 8px;
  background: var(--bg3);
  border: 2px solid var(--accent-dim);
  overflow: hidden;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.active-thumb img { width: 100%; height: 100%; object-fit: cover; }

.active-info { flex: 1; }
.active-label { font-size: 11px; color: var(--accent-dim); text-transform: uppercase; letter-spacing: 0.12em; }
.active-name { font-family: 'Cinzel', serif; font-size: 22px; color: var(--accent2); line-height: 1.1; }
.active-conditions { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }

.cond-pill {
  font-size: 10px; font-weight: 600; padding: 1px 7px;
  border-radius: 3px; text-transform: uppercase; letter-spacing: 0.05em;
}

.active-hp-bar {
  width: 80px;
}
.hp-bar-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; text-align: center; }
.hp-bar-track {
  height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden;
  border: 1px solid var(--border2);
}
.hp-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

/* On deck */
.deck-row {
  display: flex;
  gap: 10px;
  width: 100%;
  max-width: 600px;
}

.deck-card {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.deck-thumb {
  width: 30px; height: 30px;
  border-radius: 5px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  overflow: hidden;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.deck-thumb img { width: 100%; height: 100%; object-fit: cover; }

.deck-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
.deck-name { font-family: 'Cinzel', serif; font-size: 13px; color: var(--text); }

/* ── AMBIENT MODE ────────────────────────────────────── */
.ambient-view {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.ambient-time-block {
  text-align: center;
}

.ambient-time {
  font-family: 'Cinzel', serif;
  font-size: 48px;
  color: var(--accent2);
  letter-spacing: 0.04em;
  line-height: 1;
}

.ambient-date {
  font-size: 16px;
  color: var(--text2);
  letter-spacing: 0.08em;
  margin-top: 6px;
  text-transform: uppercase;
}

.ambient-info-row {
  display: flex;
  gap: 24px;
  align-items: center;
}

.ambient-info-block {
  text-align: center;
}

.ambient-info-val {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  color: var(--text);
}

.ambient-info-label {
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 3px;
}

.ambient-divider {
  width: 1px;
  height: 40px;
  background: var(--border2);
}

.event-block {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 20px;
  text-align: center;
}

.event-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
.event-name { font-family: 'Cinzel', serif; font-size: 16px; color: var(--accent); margin-top: 2px; }
.event-countdown { font-family: 'Cinzel', serif; font-size: 24px; color: var(--amber); margin-top: 4px; }

/* Moon row */
.moon-row {
  display: flex;
  gap: 20px;
  align-items: center;
}

.moon-block { text-align: center; }
.moon-phase { font-size: 24px; }
.moon-name { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.moon-day { font-size: 12px; color: var(--text3); }

/* Weather */
.weather-icon { font-size: 32px; }
.weather-desc { font-size: 14px; color: var(--text2); margin-top: 4px; text-align: center; }

/* ── BAR CONTENT ─────────────────────────────────────── */
.bar-world-info {
  display: flex;
  align-items: center;
  gap: 20px;
  flex: 1;
}

.bar-time {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  color: var(--accent2);
  white-space: nowrap;
}

.bar-date {
  font-size: 13px;
  color: var(--text2);
  white-space: nowrap;
}

.bar-sep { width: 1px; height: 28px; background: var(--border2); flex-shrink: 0; }

.bar-weather { display: flex; align-items: center; gap: 8px; }
.bar-weather-icon { font-size: 20px; }
.bar-weather-text { font-size: 13px; color: var(--text2); }

.bar-event { flex: 1; text-align: right; }
.bar-event-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
.bar-event-name { font-family: 'Cinzel', serif; font-size: 13px; color: var(--accent); }
.bar-event-time { font-size: 13px; color: var(--amber); font-weight: 600; }

/* Thekodia wordmark */
.thekodia-mark {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  position: absolute;
  bottom: 8px;
  right: 14px;
  opacity: 0.4;
}

/* Combat bar content */
.bar-combat-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}

.bar-combatant {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
}

.bar-combatant.current {
  border-color: var(--accent-dim);
  background: rgba(200,169,110,0.06);
}

.bar-comb-thumb {
  width: 24px; height: 24px;
  border-radius: 4px;
  background: var(--bg2);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}
.bar-comb-thumb img { width: 100%; height: 100%; object-fit: cover; }

.bar-comb-name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--text); }
.bar-comb-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }

.bar-round {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--text2);
  white-space: nowrap;
  margin-left: auto;
}

/* No combat placeholder */
.bar-no-combat {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--text3);
  letter-spacing: 0.1em;
}

</style>
</head>
<body>

<!-- TOP BAR (mirrored for far-side players) -->
<div class="display-bar bar-top" id="topBar">
  <div class="bar-world-info" id="topBarContent"></div>
</div>

<!-- MIDDLE AREA -->
<div class="middle-area">
  <!-- Combat view -->
  <div class="combat-view" id="combatView" style="display:none">
    <div class="round-badge" id="roundBadge">Round 1</div>
    <div class="active-turn-block" id="activeTurnBlock">
      <div class="active-thumb" id="activeThumb">⚔</div>
      <div class="active-info">
        <div class="active-label">Current Turn</div>
        <div class="active-name" id="activeName">—</div>
        <div class="active-conditions" id="activeConditions"></div>
      </div>
      <div class="active-hp-bar" id="activeHPWrap" style="display:none">
        <div class="hp-bar-label">HP</div>
        <div class="hp-bar-track">
          <div class="hp-bar-fill" id="activeHPBar"></div>
        </div>
      </div>
    </div>
    <div class="deck-row" id="deckRow"></div>
  </div>

  <!-- Ambient view -->
  <div class="ambient-view" id="ambientView">
    <div class="ambient-time-block">
      <div class="ambient-time" id="ambientTime">—</div>
      <div class="ambient-date" id="ambientDate">—</div>
    </div>
    <div class="ambient-info-row">
      <div class="ambient-info-block" id="ambientWeatherBlock">
        <div class="weather-icon" id="ambientWeatherIcon">☀</div>
        <div class="weather-desc" id="ambientWeatherDesc">Clear skies</div>
      </div>
      <div class="ambient-divider" id="moonDivider"></div>
      <div class="moon-row" id="moonRow"></div>
    </div>
    <div class="event-block" id="ambientEventBlock" style="display:none">
      <div class="event-label" id="ambientEventLabel">Until Event</div>
      <div class="event-name" id="ambientEventName">—</div>
      <div class="event-countdown" id="ambientEventCountdown">—</div>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="display-bar bar-bottom" id="bottomBar">
  <div class="bar-world-info" id="bottomBarContent"></div>
</div>

<script>
// Load settings from localStorage (written by thekodia-settings.js on any DM page)
const _displayRawSettings = (() => { try { return JSON.parse(localStorage.getItem('thekodia_settings') || '{}'); } catch { return {}; } })();
const _displayCal = _displayRawSettings.calendar || {};
const _displayPD  = _displayRawSettings.playerDisplay || {};

const THEKODIA_MONTHS = Array.isArray(_displayCal.months) && _displayCal.months.length > 0
  ? _displayCal.months
  : ['Wahuary','Dosuary','Tresuary','Nneuary','Wuuary',
     'Situary','Sietuary','Octuary','Tisauary','Shiuary',
     'Hdashuary','Docuary'];
const DAYS_PER_MONTH_DISPLAY = (_displayCal.daysPerMonth > 0) ? _displayCal.daysPerMonth : 28;
const WORLD_NAME = (_displayRawSettings.worldName || 'Thekodia').trim() || 'Thekodia';
const DISPLAY_ERA_NAME = ((_displayCal.eraName || '').trim()) || 'CE';

// Display control flags from DM settings
const SHOW_HP_BARS    = _displayPD.showHpBars    !== false;
const SHOW_CONDITIONS = _displayPD.showConditions !== false;
const MASK_ENEMIES    = !!_displayPD.maskEnemies;

const _savedMoonsDisplay = _displayRawSettings.moons;
const MOON_DATA = Array.isArray(_savedMoonsDisplay) && _savedMoonsDisplay.length > 0
  ? _savedMoonsDisplay.map(m => ({ name: m.name, cycle: m.cycle }))
  : [
    { name: 'Nox', cycle: 14 },
    { name: 'Tharis', cycle: 24 },
    { name: 'Cerath', cycle: 36 },
  ];

const MOON_PHASES = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];

// ── STATE ────────────────────────────────────────────────
let displayMode = 'ambient'; // 'ambient' | 'combat'
let weather = { icon: '☀', desc: 'Clear skies' };
let eventData = null; // { name, remainingMins }
let combatState = null;
let clockState = null;

function loadState() {
  try { weather = JSON.parse(localStorage.getItem('thekodia_weather') || '{"icon":"☀","desc":"Clear skies"}'); } catch {}
  try { eventData = JSON.parse(localStorage.getItem('thekodia_event') || 'null'); } catch {}
  try {
    const raw = localStorage.getItem('thekodia_display_state');
    if (raw) combatState = JSON.parse(raw);
  } catch {}
  try {
    const raw = localStorage.getItem('thekodia_clock');
    if (raw) clockState = JSON.parse(raw);
  } catch {}
}

// ── CLOCK HELPERS ────────────────────────────────────────
function getClockDisplay() {
  if (!clockState) return { time: '—:—', date: `— ${DISPLAY_ERA_NAME}` };
  const { hour, minute, day, month, year } = clockState;
  const h = String(hour||0).padStart(2,'0');
  const m = String(minute||0).padStart(2,'0');
  const monthName = THEKODIA_MONTHS[(month||1)-1] || THEKODIA_MONTHS[0] || '?';
  return {
    time: `${h}:${m}`,
    date: `Day ${day||1} of ${monthName}, ${year||1} ${DISPLAY_ERA_NAME}`
  };
}

function getMoonPhase(cycleDays, currentDay) {
  const phase = Math.floor(((currentDay % cycleDays) / cycleDays) * 8);
  return MOON_PHASES[phase % 8];
}

function getMoonDisplay() {
  const dpm = DAYS_PER_MONTH_DISPLAY;
  const day = clockState ? (clockState.day + (clockState.month-1)*dpm + (clockState.year-1)*dpm*12) : 1;
  return MOON_DATA.map(m => ({
    name: m.name,
    phase: getMoonPhase(m.cycle, day),
    dayInCycle: (day % m.cycle) + 1,
    cycle: m.cycle
  }));
}

function getEventDisplay() {
  if (!eventData) return null;
  const rem = eventData.remainingMins || 0;
  if (rem <= 0) return { name: eventData.name, text: 'NOW', past: true };
  const days  = Math.floor(rem / 1440);
  const hours = Math.floor((rem % 1440) / 60);
  const mins  = rem % 60;
  const parts = [];
  if (days)  parts.push(`${days}d`);
  if (hours) parts.push(`${hours}h`);
  if (mins || !parts.length) parts.push(`${mins}m`);
  return { name: eventData.name, text: parts.join(' '), past: false };
}

// ── RENDER BARS ──────────────────────────────────────────
function renderBarContent(inCombat) {
  const clock = getClockDisplay();
  const ev = getEventDisplay();

  if (inCombat && combatState) {
    const round = combatState.round || 1;
    const current = combatState.current;
    const deck = combatState.deck || [];

    const makeThumb = (c) => c?.thumb
      ? `<img src="${c.thumb}">`
      : (c?.type === 'player' ? '🧙' : c?.type === 'npc' ? '🗣' : '💀');

    let html = `<div class="bar-combat-info">`;
    if (current) {
      html += `<div class="bar-combatant current">
        <div class="bar-comb-thumb">${makeThumb(current)}</div>
        <div>
          <div class="bar-comb-label">Now</div>
          <div class="bar-comb-name">${current.displayName}</div>
        </div>
      </div>`;
    }
    deck.slice(0,2).forEach((d, i) => {
      html += `<div class="bar-combatant">
        <div class="bar-comb-thumb">${makeThumb(d)}</div>
        <div>
          <div class="bar-comb-label">${i===0?'Next':'Then'}</div>
          <div class="bar-comb-name">${d.displayName}</div>
        </div>
      </div>`;
    });
    html += `<div class="bar-round">Round ${round}</div>`;
    html += `</div>`;
    return html;
  }

  // Ambient bar
  let html = `<div class="bar-world-info">
    <div class="bar-time">${clock.time}</div>
    <div class="bar-sep"></div>
    <div class="bar-date">${clock.date}</div>
    <div class="bar-sep"></div>
    <div class="bar-weather">
      <span class="bar-weather-icon">${weather.icon}</span>
      <span class="bar-weather-text">${weather.desc}</span>
    </div>`;

  if (ev) {
    html += `<div class="bar-event" style="margin-left:auto">
      <div class="bar-event-label">${ev.past ? 'Event' : 'Until'}</div>
      <div class="bar-event-name">${ev.name}</div>
      <div class="bar-event-time">${ev.text}</div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

// ── RENDER MIDDLE ────────────────────────────────────────
function renderMiddle() {
  const inCombat = displayMode === 'combat' && combatState && combatState.active;
  document.getElementById('combatView').style.display = inCombat ? 'flex' : 'none';
  document.getElementById('ambientView').style.display = inCombat ? 'none' : 'flex';

  if (inCombat) renderCombatMiddle();
  else renderAmbientMiddle();
}

function renderCombatMiddle() {
  const cs = combatState;
  if (!cs || !cs.current) return;
  const c = cs.current;

  document.getElementById('roundBadge').textContent = `Round ${cs.round || 1}`;

  const thumbEl = document.getElementById('activeThumb');
  thumbEl.innerHTML = c.thumb ? `<img src="${c.thumb}">` : (c.type==='player'?'🧙':c.type==='npc'?'🗣':'💀');

  // Respect DM settings: mask enemy names if enabled
  const displayLabel = (MASK_ENEMIES && c.type !== 'player' && c.type !== 'npc') ? '???' : c.displayName;
  document.getElementById('activeName').textContent = displayLabel;

  const condEl = document.getElementById('activeConditions');
  if (SHOW_CONDITIONS) {
    condEl.innerHTML = (c.conditions||[]).map(cond =>
      `<span class="cond-pill" style="background:${cond.color}22;border:1px solid ${cond.color}55;color:${cond.color}">${cond.name}</span>`
    ).join('');
  } else {
    condEl.innerHTML = '';
  }

  if (SHOW_HP_BARS && c.type === 'player' && c.hpPct !== undefined) {
    document.getElementById('activeHPWrap').style.display = 'block';
    const bar = document.getElementById('activeHPBar');
    const pct = Math.round(Math.min(1, Math.max(0, c.hpPct)) * 100);
    bar.style.width = pct + '%';
    bar.style.background = pct > 60 ? 'var(--green)' : pct > 30 ? 'var(--amber)' : 'var(--red)';
  } else {
    document.getElementById('activeHPWrap').style.display = 'none';
  }

  const deck = cs.deck || [];
  const deckRow = document.getElementById('deckRow');
  if (!deck.length) { deckRow.style.display = 'none'; return; }
  deckRow.style.display = 'flex';
  deckRow.innerHTML = deck.slice(0,2).map((d, i) => {
    const dLabel = (MASK_ENEMIES && d.type !== 'player' && d.type !== 'npc') ? '???' : d.displayName;
    const hpHtml = SHOW_HP_BARS && d.type === 'player' && d.hpPct !== undefined
      ? `<div class="hp-bar-track" style="width:40px;margin-left:auto">
          <div class="hp-bar-fill" style="width:${Math.round(d.hpPct*100)}%;background:${d.hpPct>0.6?'var(--green)':d.hpPct>0.3?'var(--amber)':'var(--red)'}"></div>
         </div>` : '';
    return `<div class="deck-card">
      <div class="deck-thumb">${d.thumb ? `<img src="${d.thumb}">` : (d.type==='player'?'🧙':d.type==='npc'?'🗣':'💀')}</div>
      <div>
        <div class="deck-label">${i===0?'On Deck':'Then'}</div>
        <div class="deck-name">${dLabel}</div>
      </div>
      ${hpHtml}
    </div>`;
  }).join('');
}

function renderAmbientMiddle() {
  const clock = getClockDisplay();
  document.getElementById('ambientTime').textContent = clock.time;
  document.getElementById('ambientDate').textContent = clock.date;
  document.getElementById('ambientWeatherIcon').textContent = weather.icon;
  document.getElementById('ambientWeatherDesc').textContent = weather.desc;

  const moons = getMoonDisplay();
  document.getElementById('moonRow').innerHTML = moons.map(m => `
    <div class="moon-block">
      <div class="moon-phase">${m.phase}</div>
      <div class="moon-name">${m.name}</div>
      <div class="moon-day">Day ${m.dayInCycle}/${m.cycle}</div>
    </div>`).join('');

  const ev = getEventDisplay();
  const evBlock = document.getElementById('ambientEventBlock');
  if (ev) {
    evBlock.style.display = 'block';
    document.getElementById('ambientEventLabel').textContent = ev.past ? 'Event' : 'Until';
    document.getElementById('ambientEventName').textContent = ev.name;
    document.getElementById('ambientEventCountdown').textContent = ev.text;
  } else {
    evBlock.style.display = 'none';
  }
}

// ── FULL RENDER ──────────────────────────────────────────
function render() {
  loadState();
  if (combatState && combatState.mode) displayMode = combatState.mode;
  const inCombat = displayMode === 'combat' && combatState && combatState.active;
  const barHtml = renderBarContent(inCombat);
  document.getElementById('topBarContent').innerHTML = barHtml;
  document.getElementById('bottomBarContent').innerHTML = barHtml;
  renderMiddle();
}

// ── POLL ─────────────────────────────────────────────────
let lastStateStr = '';
setInterval(() => {
  const raw      = localStorage.getItem('thekodia_display_state') || 'null';
  const clockRaw = localStorage.getItem('thekodia_clock') || 'null';
  const eventRaw = localStorage.getItem('thekodia_event') || 'null';
  const stateStr = raw + clockRaw + eventRaw;
  if (stateStr !== lastStateStr) {
    lastStateStr = stateStr;
    try { combatState = JSON.parse(raw); } catch {}
    try { clockState  = JSON.parse(clockRaw); } catch {}
    try { eventData   = JSON.parse(eventRaw); } catch {}
    render();
  }
}, 1000);

render();
</script>
