<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thekodia — Display</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #0a0c10;
  --bg2: #0f1219;
  --bg3: #161a24;
  --border: #1e2535;
  --border2: #2a3448;
  --accent: #c8a96e;
  --accent2: #e8c97e;
  --accent-dim: #5a4428;
  --red: #e05555;
  --green: #4caf7d;
  --amber: #f0a500;
  --text: #e8e0d0;
  --text2: #8a8070;
  --text3: #3a3428;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

#middleArea {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── COMBAT VIEW ─────────────────────────────────────────── */
.combat-view {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 12px 24px;
}

.round-badge {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--text2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.active-turn-block {
  display: flex;
  align-items: center;
  gap: 16px;
  background: linear-gradient(90deg, rgba(200,169,110,0.08), transparent);
  border: 1px solid var(--accent-dim);
  border-radius: 10px;
  padding: 10px 20px 10px 12px;
  width: 100%;
  max-width: 600px;
}

.active-thumb {
  width: 52px; height: 52px;
  border-radius: 8px;
  background: var(--bg3);
  border: 2px solid var(--accent-dim);
  overflow: hidden;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.active-thumb img { width: 100%; height: 100%; object-fit: cover; }

.active-info { flex: 1; }
.active-label { font-size: 11px; color: var(--accent-dim); text-transform: uppercase; letter-spacing: 0.12em; }
.active-name { font-family: 'Cinzel', serif; font-size: 22px; color: var(--accent2); line-height: 1.1; }
.active-conditions { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }

.cond-pill {
  font-size: 10px; font-weight: 600; padding: 1px 7px;
  border-radius: 3px; text-transform: uppercase; letter-spacing: 0.05em;
}

.active-hp-bar { width: 80px; }
.hp-bar-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; text-align: center; }
.hp-bar-track { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; border: 1px solid var(--border2); }
.hp-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

.deck-row { display: flex; gap: 10px; width: 100%; max-width: 600px; }

.deck-card {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.deck-thumb {
  width: 30px; height: 30px;
  border-radius: 5px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  overflow: hidden;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.deck-thumb img { width: 100%; height: 100%; object-fit: cover; }

.deck-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
.deck-name { font-family: 'Cinzel', serif; font-size: 13px; color: var(--text); }

/* ── AMBIENT VIEW ────────────────────────────────────────── */
.ambient-view {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.ambient-time { font-family: 'Cinzel', serif; font-size: 48px; color: var(--accent2); letter-spacing: 0.04em; line-height: 1; }
.ambient-date { font-size: 16px; color: var(--text2); letter-spacing: 0.08em; margin-top: 6px; text-transform: uppercase; }

.ambient-info-row { display: flex; gap: 24px; align-items: center; }
.ambient-info-block { text-align: center; }
.ambient-divider { width: 1px; height: 40px; background: var(--border2); }

.weather-icon { font-size: 32px; }
.weather-desc { font-size: 14px; color: var(--text2); margin-top: 4px; text-align: center; }

.moon-row { display: flex; gap: 20px; align-items: center; }
.moon-block { text-align: center; }
.moon-phase { font-size: 24px; }
.moon-name { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.moon-day { font-size: 12px; color: var(--text3); }

.event-block {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 20px;
  text-align: center;
}
.event-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
.event-name { font-family: 'Cinzel', serif; font-size: 16px; color: var(--accent); margin-top: 2px; }
.event-countdown { font-family: 'Cinzel', serif; font-size: 24px; color: var(--amber); margin-top: 4px; }
  </style>
</head>
<body>
<div id="middleArea"></div>

<script>
const THEKODIA_MONTHS = [
  'Wahuary','Dosuary','Tresuary','Nneuary','Wuuary',
  'Situary','Sietuary','Octuary','Tisauary','Shiuary',
  'Hdashuary','Docuary'
];
const MOON_DATA   = [{ name:'Nox', cycle:14 }, { name:'Tharis', cycle:24 }, { name:'Cerath', cycle:36 }];
const MOON_PHASES = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];

let displayMode = 'ambient';
let weather     = { icon: '☀', desc: 'Clear skies' };
let eventData   = null;
let combatState = null;
let clockState  = null;

// ── HELPERS ──────────────────────────────────────────────
function getClockDisplay() {
  if (!clockState) return { time: '—:—', date: '— CE' };
  const { hour=0, minute=0, day=1, month=1, year=1 } = clockState;
  const monthName = THEKODIA_MONTHS[month - 1] || 'Wahuary';
  return {
    time: `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`,
    date: `Day ${day} of ${monthName}, ${year} CE`
  };
}

function getMoonPhase(cycle, currentDay) {
  return MOON_PHASES[Math.floor(((currentDay % cycle) / cycle) * 8) % 8];
}

function getMoonDisplay() {
  const day = clockState
    ? clockState.day + (clockState.month - 1) * 28 + (clockState.year - 1) * 336
    : 1;
  return MOON_DATA.map(m => ({
    name: m.name,
    phase: getMoonPhase(m.cycle, day),
    dayInCycle: (day % m.cycle) + 1,
    cycle: m.cycle
  }));
}

function getEventDisplay() {
  if (!eventData) return null;
  const rem = eventData.remainingMins || 0;
  if (rem <= 0) return { name: eventData.name, text: 'NOW', past: true };
  const days  = Math.floor(rem / 1440);
  const hours = Math.floor((rem % 1440) / 60);
  const mins  = rem % 60;
  const parts = [];
  if (days)  parts.push(`${days}d`);
  if (hours) parts.push(`${hours}h`);
  if (mins || !parts.length) parts.push(`${mins}m`);
  return { name: eventData.name, text: parts.join(' '), past: false };
}

// ── BUILD HTML ───────────────────────────────────────────
function buildCombatHTML() {
  const cs = combatState;
  if (!cs || !cs.current) return buildAmbientHTML();
  const c = cs.current;

  const thumb = c.thumb ? `<img src="${c.thumb}">` : (c.type==='player'?'🧙':c.type==='npc'?'🗣':'💀');

  const conds = (c.conditions||[]).map(cond =>
    `<span class="cond-pill" style="background:${cond.color}22;border:1px solid ${cond.color}55;color:${cond.color}">${cond.name}</span>`
  ).join('');

  const hpPct = (c.type==='player' && c.hpPct!==undefined)
    ? Math.round(Math.min(1, Math.max(0, c.hpPct)) * 100) : null;
  const hpColor = hpPct > 60 ? 'var(--green)' : hpPct > 30 ? 'var(--amber)' : 'var(--red)';

  const deck = (cs.deck||[]).slice(0,2).map((d, i) => {
    const dThumb = d.thumb ? `<img src="${d.thumb}">` : (d.type==='player'?'🧙':d.type==='npc'?'🗣':'💀');
    const dPct   = (d.type==='player' && d.hpPct!==undefined) ? Math.round(d.hpPct*100) : null;
    const dColor = d.hpPct > 0.6 ? 'var(--green)' : d.hpPct > 0.3 ? 'var(--amber)' : 'var(--red)';
    return `<div class="deck-card">
      <div class="deck-thumb">${dThumb}</div>
      <div>
        <div class="deck-label">${i===0?'On Deck':'Then'}</div>
        <div class="deck-name">${d.displayName}</div>
      </div>
      ${dPct!==null?`<div class="hp-bar-track" style="width:40px;margin-left:auto">
        <div class="hp-bar-fill" style="width:${dPct}%;background:${dColor}"></div></div>`:''}
    </div>`;
  }).join('');

  return `<div class="combat-view">
    <div class="round-badge">Round ${cs.round||1}</div>
    <div class="active-turn-block">
      <div class="active-thumb">${thumb}</div>
      <div class="active-info">
        <div class="active-label">Current Turn</div>
        <div class="active-name">${c.displayName}</div>
        <div class="active-conditions">${conds}</div>
      </div>
      ${hpPct!==null?`<div class="active-hp-bar">
        <div class="hp-bar-label">HP</div>
        <div class="hp-bar-track"><div class="hp-bar-fill" style="width:${hpPct}%;background:${hpColor}"></div></div>
      </div>`:''}
    </div>
    ${deck?`<div class="deck-row">${deck}</div>`:''}
  </div>`;
}

function buildAmbientHTML() {
  const clock = getClockDisplay();
  const ev    = getEventDisplay();

  const moons = getMoonDisplay().map(m => `
    <div class="moon-block">
      <div class="moon-phase">${m.phase}</div>
      <div class="moon-name">${m.name}</div>
      <div class="moon-day">Day ${m.dayInCycle}/${m.cycle}</div>
    </div>`).join('');

  const evHTML = ev ? `<div class="event-block">
    <div class="event-label">${ev.past?'Event':'Until'}</div>
    <div class="event-name">${ev.name}</div>
    <div class="event-countdown">${ev.text}</div>
  </div>` : '';

  return `<div class="ambient-view">
    <div class="ambient-time-block">
      <div class="ambient-time">${clock.time}</div>
      <div class="ambient-date">${clock.date}</div>
    </div>
    <div class="ambient-info-row">
      <div class="ambient-info-block">
        <div class="weather-icon">${weather.icon}</div>
        <div class="weather-desc">${weather.desc}</div>
      </div>
      <div class="ambient-divider"></div>
      <div class="moon-row">${moons}</div>
    </div>
    ${evHTML}
  </div>`;
}

// ── RENDER ───────────────────────────────────────────────
function render() {
  const inCombat = displayMode === 'combat' && combatState && combatState.active;
  document.getElementById('middleArea').innerHTML = inCombat ? buildCombatHTML() : buildAmbientHTML();
}

// ── DATA SYNC ────────────────────────────────────────────
const WATCHED_KEYS = ['thekodia_display_state','thekodia_clock','thekodia_event','thekodia_weather'];

function readAndRender() {
  try { combatState = JSON.parse(localStorage.getItem('thekodia_display_state') || 'null'); } catch {}
  try { clockState  = JSON.parse(localStorage.getItem('thekodia_clock')          || 'null'); } catch {}
  try { eventData   = JSON.parse(localStorage.getItem('thekodia_event')          || 'null'); } catch {}
  try { const w = JSON.parse(localStorage.getItem('thekodia_weather') || 'null'); if (w) weather = w; } catch {}
  if (combatState && combatState.mode) displayMode = combatState.mode;
  render();
}

// Immediate reaction when another window writes localStorage
window.addEventListener('storage', (e) => {
  if (WATCHED_KEYS.includes(e.key)) readAndRender();
});

// Fallback poll for same-window writes
let lastStr = '';
setInterval(() => {
  const str = WATCHED_KEYS.map(k => localStorage.getItem(k) || '').join('|');
  if (str !== lastStr) { lastStr = str; readAndRender(); }
}, 1000);

readAndRender();
</script>
</body>
</html>
