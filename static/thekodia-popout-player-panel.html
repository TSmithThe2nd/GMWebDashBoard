<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thekodia — Player Panel</title>
  <link rel="icon" type="image/png" href="thekodia-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #0a0c10;
  --bg2: #0f1219;
  --bg3: #161a24;
  --border: #1e2535;
  --border2: #2a3448;
  --accent: #c8a96e;
  --accent2: #e8c97e;
  --accent-dim: #5a4428;
  --red: #e05555;
  --green: #4caf7d;
  --amber: #f0a500;
  --text: #e8e0d0;
  --text2: #8a8070;
  --text3: #3a3428;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { background-color: #0a0c10 !important; }

body {
  background-color: #0a0c10 !important;
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  display: flex;
  align-items: stretch;
}

/* ── MAIN BAR ─────────────────────────────────────────── */
.bar {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 0;
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 0 5px;
  -webkit-app-region: drag;
  position: relative;
  overflow: hidden;
}

/* Left accent line */
.bar::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 2px;
  background: var(--accent-dim);
  border-radius: 1px;
}

/* ── SEPARATORS ──────────────────────────────────────── */
.sep {
  width: 1px;
  height: 28px;
  background: var(--border2);
  flex-shrink: 0;
  margin: 0 10px;
}

/* ── ROUND BADGE ─────────────────────────────────────── */
.round-badge {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--text2);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
  padding-left: 10px;
}

/* ── COMBATANT BLOCK ─────────────────────────────────── */
.combatant-block {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}

.c-thumb {
  width: 24px; height: 24px;
  border-radius: 2px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  overflow: hidden;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
}
.c-thumb img { width: 100%; height: 100%; object-fit: cover; }
.c-thumb.current { border-color: var(--accent-dim); }

.c-info { display: flex; flex-direction: column; gap: 1px; }
.c-label {
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  line-height: 1;
}
.c-name {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  color: var(--accent2);
  line-height: 1.1;
  white-space: nowrap;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
.c-name.deck { font-size: 12px; color: var(--text); }

.c-hp {
  width: 48px;
  flex-shrink: 0;
}
.hp-track {
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 3px;
}
.hp-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

/* ── AMBIENT BLOCKS ──────────────────────────────────── */
.amb-time {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  color: var(--accent2);
  letter-spacing: 0.04em;
  white-space: nowrap;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  flex-shrink: 0;
  padding-left: 10px;
}

.amb-date {
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
  flex-shrink: 0;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}

.amb-weather {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
.amb-wx-icon { font-size: 18px; }
.amb-wx-desc { font-size: 12px; color: var(--text2); text-shadow: 0 1px 4px rgba(0,0,0,0.8); }

.amb-moons {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-shrink: 0;
}
.moon-item { display: flex; align-items: center; gap: 4px; }
.moon-phase { font-size: 16px; }
.moon-name { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }

.amb-event {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.amb-event-name { font-family: 'Cinzel', serif; font-size: 12px; color: var(--accent); white-space: nowrap; }
.amb-event-time { font-family: 'Cinzel', serif; font-size: 14px; color: var(--amber); white-space: nowrap; }
.amb-event-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }

/* ── CLOSE BTN ───────────────────────────────────────── */
.close-btn {
  position: absolute;
  top: 50%; right: 8px;
  transform: translateY(-50%);
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text3);
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.2s, border-color 0.15s, color 0.15s;
  -webkit-app-region: no-drag;
  padding: 0;
}
body:hover .close-btn { opacity: 1; }
.close-btn:hover { border-color: var(--red); color: var(--red); background: rgba(224,85,85,0.12); }

/* ── RESIZE HANDLE ───────────────────────────────────── */
.resize-handle {
  position: fixed;
  bottom: 0; right: 0;
  width: 16px; height: 16px;
  cursor: se-resize;
  -webkit-app-region: no-drag;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.2s;
}
.resize-handle::after {
  content: '';
  position: absolute;
  right: 3px; bottom: 3px;
  width: 7px; height: 7px;
  border-right: 2px solid var(--border2);
  border-bottom: 2px solid var(--border2);
}
body:hover .resize-handle { opacity: 1; }
  </style>
</head>
<body>

<div class="bar" id="bar">
  <div id="barContent"></div>
  <button class="close-btn" onclick="typeof pywebview!=='undefined'?pywebview.api.close_self():window.close()" title="Close">✕</button>
</div>
<div class="resize-handle" id="resizeHandle"></div>

<script>
const _rawSettings = (() => { try { return JSON.parse(localStorage.getItem('thekodia_settings') || '{}'); } catch { return {}; } })();
const _cal = _rawSettings.calendar || {};
const _pd  = _rawSettings.playerDisplay || {};

const THEKODIA_MONTHS = Array.isArray(_cal.months) && _cal.months.length > 0
  ? _cal.months
  : ['Wahuary','Dosuary','Tresuary','Nneuary','Wuuary',
     'Situary','Sietuary','Octuary','Tisauary','Shiuary',
     'Hdashuary','Docuary'];
const DAYS_PER_MONTH = (_cal.daysPerMonth > 0) ? _cal.daysPerMonth : 28;
const ERA_NAME = ((_cal.eraName || '').trim()) || 'CE';

const SHOW_HP_BARS    = _pd.showHpBars    !== false;
const SHOW_CONDITIONS = _pd.showConditions !== false;
const MASK_ENEMIES    = !!_pd.maskEnemies;

const _savedMoons = _rawSettings.moons;
const MOON_DATA = Array.isArray(_savedMoons) && _savedMoons.length > 0
  ? _savedMoons.map(m => ({ name: m.name, cycle: m.cycle }))
  : [{ name: 'Nox', cycle: 14 }, { name: 'Tharis', cycle: 24 }, { name: 'Cerath', cycle: 36 }];
const MOON_PHASES = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];

// ── STATE ────────────────────────────────────────────────
let displayMode = 'ambient';
let weather = { icon: '☀', desc: 'Clear skies' };
let eventData = null;
let combatState = null;
let clockState = null;

function loadState() {
  try { weather = JSON.parse(localStorage.getItem('thekodia_weather') || '{"icon":"☀","desc":"Clear skies"}'); } catch {}
  try { eventData = JSON.parse(localStorage.getItem('thekodia_event') || 'null'); } catch {}
  try { const r = localStorage.getItem('thekodia_display_state'); if (r) combatState = JSON.parse(r); } catch {}
  try { const r = localStorage.getItem('thekodia_clock'); if (r) clockState = JSON.parse(r); } catch {}
}

// ── HELPERS ──────────────────────────────────────────────
function getClockDisplay() {
  if (!clockState) return { time: '—:—', date: `— ${ERA_NAME}` };
  const { hour, minute, day, month, year } = clockState;
  const h = String(hour||0).padStart(2,'0');
  const m = String(minute||0).padStart(2,'0');
  const monthName = THEKODIA_MONTHS[(month||1)-1] || '?';
  return { time: `${h}:${m}`, date: `Day ${day||1} of ${monthName}, ${year||1} ${ERA_NAME}` };
}

function getMoonPhase(cycleDays, day) {
  return MOON_PHASES[Math.floor(((day % cycleDays) / cycleDays) * 8) % 8];
}

function getMoonDisplay() {
  const day = clockState ? (clockState.day + (clockState.month-1)*DAYS_PER_MONTH + (clockState.year-1)*DAYS_PER_MONTH*12) : 1;
  return MOON_DATA.map(m => ({ name: m.name, phase: getMoonPhase(m.cycle, day), dayInCycle: (day % m.cycle) + 1 }));
}

function getEventDisplay() {
  if (!eventData) return null;
  const rem = eventData.remainingMins || 0;
  if (rem <= 0) return { name: eventData.name, text: 'NOW', past: true };
  const days  = Math.floor(rem / 1440);
  const hours = Math.floor((rem % 1440) / 60);
  const mins  = rem % 60;
  const parts = [];
  if (days)  parts.push(`${days}d`);
  if (hours) parts.push(`${hours}h`);
  if (mins || !parts.length) parts.push(`${mins}m`);
  return { name: eventData.name, text: parts.join(' '), past: false };
}

function thumbHtml(c, isCurrent) {
  const inner = c.thumb ? `<img src="${c.thumb}">` : (c.type==='player'?'🧙':c.type==='npc'?'🗣':'💀');
  return `<div class="c-thumb${isCurrent?' current':''}">${inner}</div>`;
}

// ── RENDER ───────────────────────────────────────────────
function render() {
  loadState();
  if (combatState && combatState.mode) displayMode = combatState.mode;

  const inCombat = displayMode === 'combat' && combatState && combatState.active;
  const el = document.getElementById('barContent');
  el.style.display = 'flex';
  el.style.alignItems = 'center';
  el.style.gap = '0';
  el.style.flex = '1';
  el.style.overflow = 'hidden';

  if (inCombat) el.innerHTML = buildCombatBar();
  else          el.innerHTML = buildAmbientBar();
}

function buildCombatBar() {
  const cs = combatState;
  if (!cs || !cs.current) return '';
  const c = cs.current;
  const deck = cs.deck || [];

  const displayName  = (MASK_ENEMIES && c.type !== 'player' && c.type !== 'npc') ? '???' : c.displayName;
  const hpHtml = (SHOW_HP_BARS && c.hpPct !== undefined)
    ? `<div class="c-hp"><div class="hp-track"><div class="hp-fill" style="width:${Math.round(Math.min(1,Math.max(0,c.hpPct))*100)}%;background:${c.hpPct>0.6?'var(--green)':c.hpPct>0.3?'var(--amber)':'var(--red)'}"></div></div></div>`
    : '';

  let html = `
    <div class="round-badge">Round ${cs.round || 1}</div>
    <div class="sep"></div>
    <div class="combatant-block">
      ${thumbHtml(c, true)}
      <div class="c-info">
        <div class="c-label">Current Turn</div>
        <div class="c-name">${displayName}</div>
      </div>
      ${hpHtml}
    </div>`;

  deck.slice(0,2).forEach((d, i) => {
    const dName = (MASK_ENEMIES && d.type !== 'player' && d.type !== 'npc') ? '???' : d.displayName;
    const dHp = (SHOW_HP_BARS && d.hpPct !== undefined)
      ? `<div class="c-hp"><div class="hp-track"><div class="hp-fill" style="width:${Math.round(Math.min(1,Math.max(0,d.hpPct))*100)}%;background:${d.hpPct>0.6?'var(--green)':d.hpPct>0.3?'var(--amber)':'var(--red)'}"></div></div></div>`
      : '';
    html += `
      <div class="sep"></div>
      <div class="combatant-block">
        ${thumbHtml(d, false)}
        <div class="c-info">
          <div class="c-label">${i===0?'On Deck':'Then'}</div>
          <div class="c-name deck">${dName}</div>
        </div>
        ${dHp}
      </div>`;
  });

  return html;
}

function buildAmbientBar() {
  const clock = getClockDisplay();
  const moons = getMoonDisplay();
  const ev = getEventDisplay();

  let html = `
    <div class="amb-time">${clock.time}</div>
    <div class="sep"></div>
    <div class="amb-date">${clock.date}</div>
    <div class="sep"></div>
    <div class="amb-weather">
      <span class="amb-wx-icon">${weather.icon}</span>
      <span class="amb-wx-desc">${weather.desc}</span>
    </div>
    <div class="sep"></div>
    <div class="amb-moons">
      ${moons.map(m => `<div class="moon-item"><span class="moon-phase">${m.phase}</span><span class="moon-name">${m.name}</span></div>`).join('')}
    </div>`;

  if (ev) {
    html += `
      <div class="sep"></div>
      <div class="amb-event">
        <div class="amb-event-label">${ev.past ? 'Event' : 'Until'}</div>
        <div class="amb-event-name">${ev.name}</div>
        <div class="amb-event-time">${ev.text}</div>
      </div>`;
  }

  return html;
}

// ── POLL ─────────────────────────────────────────────────
let lastStateStr = '';
setInterval(() => {
  const raw      = localStorage.getItem('thekodia_display_state') || 'null';
  const clockRaw = localStorage.getItem('thekodia_clock') || 'null';
  const eventRaw = localStorage.getItem('thekodia_event') || 'null';
  const wxRaw    = localStorage.getItem('thekodia_weather') || 'null';
  const stateStr = raw + clockRaw + eventRaw + wxRaw;
  if (stateStr !== lastStateStr) {
    lastStateStr = stateStr;
    try { combatState = JSON.parse(raw); } catch {}
    try { clockState  = JSON.parse(clockRaw); } catch {}
    try { eventData   = JSON.parse(eventRaw); } catch {}
    try { weather     = JSON.parse(wxRaw); } catch {}
    render();
  }
}, 1000);

render();

// ── RESIZE HANDLE ─────────────────────────────────────
(function() {
  const handle = document.getElementById('resizeHandle');
  if (!handle) return;
  let startX, startY, startW, startH, lastCall = 0;
  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    startX = e.screenX; startY = e.screenY;
    startW = window.innerWidth; startH = window.innerHeight;
    const onMove = e => {
      const now = Date.now();
      if (now - lastCall < 32) return;
      lastCall = now;
      const w = Math.max(300, startW + (e.screenX - startX));
      const h = Math.max(44, startH + (e.screenY - startY));
      if (typeof pywebview !== 'undefined') pywebview.api.resize_self(w, h);
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();
</script>
</body>
</html>
