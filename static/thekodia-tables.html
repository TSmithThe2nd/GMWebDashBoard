<title>Thekodia DM — Tables</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e28; --panel: #181c26;
  --border: #2a3045; --border2: #3a4560;
  --accent: #c8a96e; --accent2: #e8c97e; --accent-dim: #7a6238;
  --red: #e05555; --red-dim: #7a2828;
  --green: #4caf7d; --green-dim: #1e5c38;
  --blue: #5b8de8; --blue-dim: #2a4a8a;
  --amber: #f0a500; --teal: #4ecdc4;
  --text: #e8e0d0; --text2: #a09880; --text3: #605848;
  --radius: 6px; --radius2: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 15px; min-height: 100vh; }

.app-header {
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100;
}
.app-title { font-family: 'Cinzel', serif; font-size: 16px; color: var(--accent); letter-spacing: 0.1em; white-space: nowrap; }
.nav-tabs { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
.nav-tab {
  padding: 5px 14px; border-radius: var(--radius); border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 600; letter-spacing: 0.05em; cursor: pointer;
  transition: all 0.15s; text-transform: uppercase;
}
.nav-tab:hover { border-color: var(--border2); color: var(--text); }
.nav-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }

.btn {
  padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border2);
  background: transparent; color: var(--text); font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
}
.btn:hover { background: var(--bg3); border-color: var(--accent-dim); }
.btn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }
.btn.primary:hover { background: #8a7040; }
.btn.small { padding: 3px 10px; font-size: 12px; }
.btn.danger { border-color: var(--red-dim); color: var(--red); }
.btn.danger:hover { background: rgba(224,85,85,0.1); }

/* Layout */
.main-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 12px;
  padding: 16px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Table list */
.table-list-panel {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius2); overflow: hidden;
  display: flex; flex-direction: column;
  height: fit-content; position: sticky; top: 60px;
}
.panel-head {
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title { font-family: 'Cinzel', serif; font-size: 12px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
.table-list { overflow-y: auto; max-height: 70vh; }
.table-list-item {
  padding: 9px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.15s;
}
.table-list-item:last-child { border-bottom: none; }
.table-list-item:hover { background: var(--bg3); }
.table-list-item.active { background: var(--accent-dim); border-left: 3px solid var(--accent); }
.table-list-item.active .tli-name { color: var(--accent2); }
.tli-name { font-weight: 600; font-size: 13px; }
.tli-die { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 1px 6px; border-radius: 3px; border: 1px solid var(--border); }
.table-list-item.active .tli-die { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); }

/* Main content */
.table-content { display: flex; flex-direction: column; gap: 12px; }

/* Roll panel */
.roll-panel {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius2); padding: 20px 24px;
  text-align: center;
}
.roll-panel-title { font-family: 'Cinzel', serif; font-size: 18px; color: var(--accent); margin-bottom: 4px; }
.roll-die-badge {
  display: inline-block; font-size: 12px; color: var(--text3);
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 2px 10px; margin-bottom: 16px;
}
.roll-result-number {
  font-family: 'Cinzel', serif; font-size: 48px; color: var(--amber);
  line-height: 1; margin-bottom: 8px;
}
.roll-result-text {
  font-size: 16px; color: var(--text); line-height: 1.5;
  max-width: 600px; margin: 0 auto 16px; white-space: pre-wrap;
  word-break: break-word;
}
.roll-result-text.empty { color: var(--text3); font-style: italic; }
.roll-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

/* History */
.history-panel {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius2); overflow: hidden;
}
.history-list {
  padding: 8px 12px; max-height: 180px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 3px;
}
.history-entry {
  display: flex; gap: 10px; font-size: 12px;
  padding: 4px 0; border-bottom: 1px solid var(--border);
}
.history-entry:last-child { border-bottom: none; }
.history-roll { color: var(--amber); font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; flex-shrink: 0; min-width: 32px; }
.history-result { color: var(--text2); flex: 1; word-break: break-word; }

/* Table editor */
.editor-panel {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--radius2); overflow: hidden;
}
.editor-toolbar {
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.editor-table {
  width: 100%; border-collapse: collapse;
}
.editor-table th {
  padding: 6px 12px; text-align: left; font-size: 11px;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border); background: var(--bg2);
  font-weight: 600;
}
.editor-table td {
  padding: 0; border-bottom: 1px solid var(--border); vertical-align: top;
}
.editor-table tr:last-child td { border-bottom: none; }
.editor-table tr:hover td { background: var(--bg3); }
.cell-input {
  width: 100%; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 14px;
  padding: 7px 12px; resize: none; min-height: 36px;
  overflow: hidden; line-height: 1.4;
}
.cell-input:focus { background: var(--bg2); }
.cell-input.roll-cell { max-width: 80px; text-align: center; color: var(--amber); font-weight: 600; }
.cell-del {
  background: transparent; border: none; color: var(--text3);
  cursor: pointer; padding: 7px 10px; font-size: 14px; transition: color 0.15s;
}
.cell-del:hover { color: var(--red); }
.editor-scroll { overflow-x: auto; max-height: 400px; overflow-y: auto; }

/* Add table modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 500;
  align-items: center; justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius2); padding: 20px; width: 360px;
  max-width: 90vw;
}
.modal-title { font-family: 'Cinzel', serif; font-size: 15px; color: var(--accent); margin-bottom: 14px; }
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.field label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
.field input, .field select {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 14px;
  padding: 6px 10px;
}
.field input:focus, .field select:focus { outline: none; border-color: var(--accent-dim); }
.field select option { background: var(--bg2); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>

<div class="app-header">

    <button class="nav-tab" onclick="document.getElementById('backupFileInput').click()" title="Import Backup">📂 Restore</button>
  </div>
</div>
<input type="file" id="backupFileInput" accept=".json" style="display:none"
       onchange="ThekodiaStorage.importBackup(this.files[0]); this.value='';">

<div class="main-layout">

  <!-- Left: table list -->
  <div class="table-list-panel">

    </div>
    <div class="table-list" id="tableList"></div>
    <div style="padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:6px">
      <label style="flex:1">
        <input type="file" id="csvFileInput" accept=".csv" style="display:none"
               onchange="importCSV(this.files[0]); this.value='';">
        <button class="btn small" style="width:100%" onclick="document.getElementById('csvFileInput').click()">📂 Import CSV</button>
      </label>
    </div>
  </div>

  <!-- Right: content -->
  <div class="table-content" id="tableContent">
    <div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:14px">
      Select a table to begin
    </div>
  </div>

</div>

<!-- New Table Modal -->
<div class="modal-overlay" id="newTableModal">
  <div class="modal">
    <div class="modal-title">New Table</div>
    <div class="field">
      <label>Table Name</label>
      <input type="text" id="newTableName" placeholder="e.g. Forest Encounters">
    </div>
    <div class="field">
      <label>Die Type</label>
      <select id="newTableDie">
        <option>d4</option><option>d6</option><option>d8</option>
        <option>d10</option><option>d12</option><option selected>d20</option>
        <option>d100</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('newTableModal')">Cancel</button>
      <button class="btn primary" onclick="createNewTable()">Create</button>
    </div>
  </div>
</div>

// ── State ─────────────────────────────────────────────────
let tables = [];
let activeIdx = 0;
let rollHistory = {}; // tableIdx -> [{roll, result}]

// ── Storage ───────────────────────────────────────────────
const UI_KEY = 'thekodia_tables_ui';

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tables)); } catch {}
}

function saveUI() {
  try { localStorage.setItem(UI_KEY, JSON.stringify({ activeIdx, rollHistory })); } catch {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      tables = JSON.parse(raw);
    } else {
      // First load — use starter tables
      tables = STARTER_TABLES.map(t => ({ ...t }));
      save();
    }
  } catch {
    tables = STARTER_TABLES.map(t => ({ ...t }));
    save();
  }
  // Restore UI state (active table + roll history)
  try {
    const ui = JSON.parse(localStorage.getItem(UI_KEY) || '{}');
    if (typeof ui.activeIdx === 'number') activeIdx = Math.min(ui.activeIdx, Math.max(0, tables.length - 1));
    if (ui.rollHistory && typeof ui.rollHistory === 'object') rollHistory = ui.rollHistory;
  } catch {}
}

// ── Roll logic ────────────────────────────────────────────
function parseDie(dieStr) {
  return parseInt(dieStr.replace('d', '')) || 20;
}

function rollDie(dieStr) {
  const sides = parseDie(dieStr);
  return Math.floor(Math.random() * sides) + 1;
}

function findResult(table, rollNum) {
  for (const row of table.rows) {
    const roll = row.roll.toString().trim();
    if (roll.includes('-')) {
      const [lo, hi] = roll.split('-').map(Number);
      if (rollNum >= lo && rollNum <= hi) return row.result;
    } else {
      if (parseInt(roll) === rollNum) return row.result;
    }
  }
  return 'No result found for roll ' + rollNum;
}

function doRoll() {
  const table = tables[activeIdx];
  if (!table) return;
  const rollNum = rollDie(table.die);
  const result = findResult(table, rollNum);
  // Add to history
  if (!rollHistory[activeIdx]) rollHistory[activeIdx] = [];
  rollHistory[activeIdx].unshift({ roll: rollNum, result });
  if (rollHistory[activeIdx].length > 20) rollHistory[activeIdx].pop();
  saveUI();
  renderRollResult(rollNum, result);
  renderHistory();
}

// ── Render ────────────────────────────────────────────────
function renderTableList() {
  const list = document.getElementById('tableList');
  list.innerHTML = tables.map((t, i) => `
    <div class="table-list-item ${i === activeIdx ? 'active' : ''}" onclick="selectTable(${i})">
      <span class="tli-name">${t.name}</span>
      <span class="tli-die">${t.die}</span>
    </div>`).join('');
}

function renderRollResult(rollNum, result) {
  document.getElementById('rollNumber').textContent = rollNum !== null ? rollNum : '—';
  const el = document.getElementById('rollResultText');
  if (result) {
    el.textContent = result;
    el.classList.remove('empty');
  } else {
    el.textContent = 'Roll to see a result';
    el.classList.add('empty');
  }
}

function renderHistory() {
  const hist = rollHistory[activeIdx] || [];
  const el = document.getElementById('historyList');
  if (!hist.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px 0">No rolls yet</div>';
    return;
  }
  el.innerHTML = hist.map(h => `
    <div class="history-entry">
      <div class="history-roll">${h.roll}</div>
      <div class="history-result">${h.result}</div>
    </div>`).join('');
}

function renderEditor() {
  const table = tables[activeIdx];
  if (!table) return;
  const scroll = document.getElementById('editorScroll');
  scroll.innerHTML = `
    <table class="editor-table">
      <thead><tr>
        <th style="width:80px">Roll</th>
        <th>Result</th>
        <th style="width:36px"></th>
      </tr></thead>
      <tbody id="editorBody">
      </tbody>
    </table>`;
  renderEditorRows();
}

function renderEditorRows() {
  const table = tables[activeIdx];
  const body = document.getElementById('editorBody');
  if (!body) return;
  body.innerHTML = table.rows.map((row, i) => `
    <tr>
      <td><textarea class="cell-input roll-cell" rows="1"
        oninput="updateRow(${i},'roll',this.value);autoResize(this)"
        onkeydown="handleCellKey(event,${i},'roll')"
        >${escHtml(row.roll)}</textarea></td>
      <td><textarea class="cell-input"
        oninput="updateRow(${i},'result',this.value);autoResize(this)"
        onkeydown="handleCellKey(event,${i},'result')"
        >${escHtml(row.result)}</textarea></td>
      <td><button class="cell-del" onclick="deleteRow(${i})" title="Delete row">✕</button></td>
    </tr>`).join('');
  // Auto-resize all textareas
  document.querySelectorAll('.cell-input').forEach(autoResize);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderContent() {
  const table = tables[activeIdx];
  if (!table) return;
  document.getElementById('tableContent').innerHTML = `
    <!-- Roll panel -->
    <div class="roll-panel">
      <div class="roll-panel-title">${table.name}</div>
      <div class="roll-die-badge">${table.die}</div>
      <div class="roll-result-number" id="rollNumber">—</div>
      <div class="roll-result-text empty" id="rollResultText">Roll to see a result</div>
      <div class="roll-btns">
        <button class="btn primary" style="font-size:15px;padding:8px 28px" onclick="doRoll()">🎲 Roll ${table.die}</button>
        <button class="btn" onclick="doRoll()">Reroll</button>
        <button class="btn" onclick="clearHistory()">Clear History</button>
      </div>
    </div>

    <!-- History -->
    <div class="history-panel">
      <div class="panel-head">
        <div class="panel-title">Roll History</div>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

    <!-- Editor -->
    <div class="editor-panel">
      <div class="panel-head">
        <div class="panel-title">Table Rows <span style="color:var(--text3);font-family:Rajdhani,sans-serif;font-size:11px;font-weight:400;text-transform:none">(click any cell to edit)</span></div>
        <div style="display:flex;gap:6px">
          <button class="btn small danger" onclick="confirmDeleteTable()">Delete Table</button>
          <button class="btn small" onclick="renameDieModal()">Change Die</button>
        </div>
      </div>
      <div class="editor-toolbar">
        <button class="btn small primary" onclick="addRow()">+ Add Row</button>
        <div style="font-size:12px;color:var(--text3);margin-left:4px">${table.rows.length} rows</div>
      </div>
      <div class="editor-scroll" id="editorScroll"></div>
    </div>`;
  renderEditor();
  renderHistory();
}

// ── Actions ───────────────────────────────────────────────
function selectTable(idx) {
  activeIdx = idx;
  saveUI();
  renderTableList();
  renderContent();
}

function updateRow(rowIdx, field, value) {
  if (!tables[activeIdx]) return;
  tables[activeIdx].rows[rowIdx][field] = value;
  save();
}

function handleCellKey(e, rowIdx, field) {
  // Tab between cells
  if (e.key === 'Tab') {
    e.preventDefault();
    const cells = document.querySelectorAll('.cell-input');
    const idx = Array.from(cells).indexOf(e.target);
    if (idx >= 0 && idx < cells.length - 1) cells[idx + 1].focus();
  }
}

function addRow() {
  const table = tables[activeIdx];
  if (!table) return;
  const lastRoll = table.rows.length > 0
    ? parseInt(table.rows[table.rows.length - 1].roll) + 1
    : 1;
  table.rows.push({ roll: String(lastRoll), result: '' });
  save();
  renderEditorRows();
  // Scroll to bottom and focus new row
  const scroll = document.getElementById('editorScroll');
  if (scroll) scroll.scrollTop = scroll.scrollHeight;
  const inputs = document.querySelectorAll('.cell-input');
  if (inputs.length) inputs[inputs.length - 2].focus(); // focus roll cell of new row
}

function deleteRow(rowIdx) {
  tables[activeIdx].rows.splice(rowIdx, 1);
  save();
  renderEditorRows();
  // Update row count display
  const cnt = document.querySelector('.editor-toolbar div');
  if (cnt) cnt.textContent = tables[activeIdx].rows.length + ' rows';
}

function clearHistory() {
  rollHistory[activeIdx] = [];
  renderHistory();
}

function confirmDeleteTable() {
  const table = tables[activeIdx];
  if (!confirm(`Delete "${table.name}"? This cannot be undone.`)) return;
  tables.splice(activeIdx, 1);
  activeIdx = Math.max(0, activeIdx - 1);
  save();
  renderTableList();
  if (tables.length) renderContent();
  else document.getElementById('tableContent').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3)">No tables. Create one or import a CSV.</div>';
}

function renameDieModal() {
  const table = tables[activeIdx];
  const die = prompt('Die type (d4/d6/d8/d10/d12/d20/d100):', table.die);
  if (!die) return;
  const valid = ['d4','d6','d8','d10','d12','d20','d100'];
  if (!valid.includes(die.toLowerCase())) { alert('Invalid die type'); return; }
  table.die = die.toLowerCase();
  save();
  renderContent();
  renderTableList();
}

// ── New table modal ───────────────────────────────────────
function openNewTableModal() {
  document.getElementById('newTableName').value = '';
  openModal('newTableModal');
  setTimeout(() => document.getElementById('newTableName').focus(), 50);
}

function createNewTable() {
  const name = document.getElementById('newTableName').value.trim();
  if (!name) { document.getElementById('newTableName').focus(); return; }
  const die = document.getElementById('newTableDie').value;
  tables.push({ name, die, rows: [] });
  save();
  activeIdx = tables.length - 1;
  closeModal('newTableModal');
  renderTableList();
  renderContent();
}

// ── CSV Import ────────────────────────────────────────────
function importCSV(file) {
  if (!file) return;
  const name = file.name.replace('.csv', '').replace(/_/g, ' ');
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    const rows = [];
    for (const line of text.split('\n')) {
      const trimmed = line.trim();
      if (!trimmed) continue;
      const parts = trimmed.split(',');
      const roll = parts[0].trim();
      // Skip header rows
      if (!roll || roll.toLowerCase() === 'roll' || !roll[0].match(/[0-9]/)) continue;
      const result = parts.slice(1).join(',').trim();
      if (result) rows.push({ roll, result });
    }
    if (!rows.length) { alert('No valid rows found in CSV.'); return; }
    // Auto-detect die type from row count
    const count = rows.length;
    let die = 'd20';
    if (count <= 4) die = 'd4';
    else if (count <= 6) die = 'd6';
    else if (count <= 8) die = 'd8';
    else if (count <= 10) die = 'd10';
    else if (count <= 12) die = 'd12';
    else if (count <= 20) die = 'd20';
    else die = 'd100';

    tables.push({ name, die, rows });
    save();
    activeIdx = tables.length - 1;
    renderTableList();
    renderContent();
  };
  reader.readAsText(file);
}

// ── Modal helpers ─────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('visible'); }
function closeModal(id) { document.getElementById(id).classList.remove('visible'); }

// Close modal on overlay click
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) closeModal(e.target.id);
});

// Enter key on new table name
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('newTableModal').classList.contains('visible')) {
    createNewTable();
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.visible').forEach(m => m.classList.remove('visible'));
  }
});

// ── Init ──────────────────────────────────────────────────
load();
renderTableList();
if (tables.length) renderContent();
</script>
